<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Huey Luey’s Prep Recipe Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
<style>

:root{
  --green:#228c55; --green-dark:#648B1A; --orange:#d35400; --orange-2:#e8651a;
  --cream:#f6f1e8; --card:#ffffff; --line:#e2d8cc; --text:#1f2937; --muted:#6b7280;
  --red:#dc2626; --shadow:0 4px 14px rgba(0,0,0,.09); --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;font-family:Poppins,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--cream);color:var(--text);-webkit-text-size-adjust:100%}
body{overflow-y:auto;overflow-x:hidden;touch-action:manipulation}
button,input,textarea,select{font-family:Poppins,sans-serif} button{cursor:pointer;border:0} input,textarea,select{outline:0}
.app{position:relative;min-height:100vh;display:flex;flex-direction:column;background:var(--cream)}
.topbar{background:var(--green);color:#fff;box-shadow:0 2px 10px rgba(0,0,0,.18);z-index:10;position:sticky;top:0}
.headerrow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 18px}
.brand{display:flex;align-items:center;gap:12px;min-width:0;flex:1 1 auto}
.logoMark{width:82px;height:54px;object-fit:contain;background:#fff;border-radius:8px;padding:3px;display:grid;place-items:center;color:var(--orange);font-size:24px;font-weight:900;letter-spacing:-.04em;box-shadow:inset 0 0 0 2px rgba(34,140,85,.14)}
.apptitle{font-size:25px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;line-height:1;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.subline{font-size:9px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;opacity:.78;margin-top:4px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;flex:0 0 auto}
.btn{border-radius:9px;padding:12px 17px;font-size:11px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:#fff;background:#223040;box-shadow:0 3px 10px rgba(0,0,0,.12);min-height:40px}
.btn:hover{filter:brightness(1.05)} .btn.primary{background:var(--green-dark)} .btn.orange{background:var(--orange)} .btn.danger{background:var(--red);color:#fff} .btn.small{padding:8px 11px;font-size:9px;border-radius:7px;min-height:34px}
.syncBadge{border-radius:999px;padding:7px 11px;font-size:10px;font-weight:900;color:#fff;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);display:flex;align-items:center;gap:7px;white-space:nowrap;min-height:36px;text-transform:uppercase;letter-spacing:.08em}
.syncBadge .dot{width:8px;height:8px;border-radius:50%;background:#f59e0b;box-shadow:0 0 0 3px rgba(255,255,255,.1)} .syncBadge.online .dot{background:#34d399}.syncBadge.error .dot{background:#ef4444}.syncBadge.online{background:rgba(34,197,94,.22)}.syncBadge.error{background:rgba(220,38,38,.85)}
.searchbar{display:none;grid-template-columns:1fr auto;gap:8px;background:var(--green-dark);padding:9px 18px}.searchbar.open{display:grid}.searchbar input{width:100%;border:2px solid rgba(255,255,255,.28);border-radius:10px;background:#fffaf4;padding:11px 12px;font-size:14px;font-weight:700;color:var(--text);min-height:42px}
#view{flex:1;padding:18px;display:flex;flex-direction:column;gap:16px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:space-between}.crumbs{font-size:12px;font-weight:900;color:var(--green);letter-spacing:.09em;text-transform:uppercase;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}.card{background:#fff;border:2px solid rgba(34,140,85,.1);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;min-height:92px;display:flex;align-items:center;justify-content:space-between;gap:12px;text-align:left;color:var(--text)}.card:hover{border-color:rgba(211,84,0,.45);transform:translateY(-1px)}.cardTitle{font-size:15px;font-weight:900;line-height:1.2;text-transform:uppercase;letter-spacing:.02em}.cardMeta{font-size:10px;font-weight:800;color:var(--muted);margin-top:5px;line-height:1.35}.back{display:inline-flex;align-items:center;gap:8px;color:var(--green);font-weight:900;cursor:pointer;user-select:none;min-height:44px;text-transform:uppercase;letter-spacing:.06em;font-size:11px}
.recipe{background:#fff;border:2px solid rgba(34,140,85,.12);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;max-width:1180px;width:100%;margin:0 auto}.recipeInner{padding:16px}.recipeTop{display:grid;grid-template-columns:minmax(0,1fr) minmax(280px,360px);gap:14px;align-items:stretch}.recipeDoc{border:2px solid #e5ded5;border-radius:14px;padding:20px;background:#fff;min-height:640px}.docTop{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;border-bottom:4px solid var(--green);padding-bottom:12px;margin-bottom:14px}.docBrand{display:flex;align-items:center;gap:10px}.docLogo{width:100px;height:64px;object-fit:contain;background:#fff;border-radius:8px;border:2px solid var(--line);display:grid;place-items:center;color:var(--orange);font-weight:900;font-size:27px}.recipeTitle,.docTitle{font-size:25px;font-weight:900;text-transform:uppercase;color:var(--green);line-height:1}.docSub{font-size:10px;font-weight:900;letter-spacing:.24em;text-transform:uppercase;color:var(--orange);margin-top:5px}.docId{text-align:right;min-width:150px;font-size:11px;font-weight:800;line-height:1.55;color:#111;word-break:break-word}.recipeMeta{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin:12px 0}.metaBox{border:2px solid var(--line);border-radius:12px;background:#fffaf4;padding:9px}.metaLabel{font-size:7.8px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.metaValue{font-size:13px;font-weight:900;color:var(--green);margin-top:3px;line-height:1.15}
.docSectionTitle{background:var(--green);color:#fff;border-radius:7px 7px 0 0;padding:7px 10px;font-size:10px;font-weight:900;letter-spacing:.16em;text-transform:uppercase}.recipeText{border:1.5px solid #ddd;border-radius:0 0 8px 8px;padding:10px;background:#fff;min-height:88px;overflow-wrap:anywhere;word-break:normal;line-height:1.42;font-size:12px;white-space:normal}.recipeText .line{margin:0 0 4px}.recipeText .sectionLine{margin:8px 0 5px;font-weight:900;color:var(--green);font-size:11px;letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--line);padding-bottom:3px}.recipeText .bulletLine,.recipeText .numberLine{padding-left:12px}.recipeText .empty{color:var(--muted);font-style:italic;font-weight:800}.sidePanel{display:flex;flex-direction:column;gap:10px}.photoBox{border:2px dashed var(--line);border-radius:12px;background:#fffaf4;min-height:250px;display:grid;place-items:center;overflow:hidden;position:relative;text-align:center;color:var(--muted);font-weight:900;padding:12px}.photoBox img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}.photoHint{position:relative;z-index:1;font-size:11px;text-transform:uppercase;letter-spacing:.08em}.photoActions,.recipeActions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-start}.fileInput{display:none}.statusNote{background:#fff4e8;border:2px solid #f0d2b4;border-radius:12px;padding:10px;color:#a73f00;font-size:11px;font-weight:800;line-height:1.35}.footer{margin:0 18px 18px;color:var(--muted);font-size:10px;text-align:center;font-weight:800;text-transform:uppercase;letter-spacing:.08em}
.modalBackdrop{position:fixed;inset:0;z-index:1000;background:rgba(31,41,55,.65);display:none;align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(3px)}.modalBackdrop.open{display:flex}.modal{width:980px;max-width:96vw;max-height:92vh;background:var(--cream);border-radius:16px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.35);display:flex;flex-direction:column}.modalHead{background:var(--orange);color:#fff;padding:15px 18px;display:flex;align-items:center;justify-content:space-between}.modalTitle{font-size:16px;font-weight:900;text-transform:uppercase;letter-spacing:.08em}.formGrid{padding:18px;display:grid;grid-template-columns:1fr 1fr;gap:12px;overflow:auto}.field{display:flex;flex-direction:column;gap:5px}.field label{font-size:9px;font-weight:900;color:var(--green);letter-spacing:.12em;text-transform:uppercase}.field input,.field textarea{width:100%;border:2px solid var(--line);border-radius:10px;background:#fffaf4;padding:11px 12px;font-size:13px;font-weight:700;color:var(--text)}.field textarea{min-height:360px;resize:vertical;line-height:1.4}.field input:focus,.field textarea:focus{border-color:var(--green);background:#fff;box-shadow:0 0 0 3px rgba(34,140,85,.1)}.modalFoot{display:flex;justify-content:flex-end;gap:8px;padding:14px 18px;background:#fffaf4;border-top:2px solid var(--line)}
@media(max-width:1180px){.headerrow{align-items:flex-start}.controls{max-width:520px}.recipeTop{grid-template-columns:1fr}.sidePanel{display:grid;grid-template-columns:1fr 1fr}.photoBox{min-height:210px}}
@media(max-width:900px){.headerrow{flex-direction:column}.controls{width:100%;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:7px}.controls .btn,.controls .syncBadge{width:100%;justify-content:center;padding:10px 8px;font-size:9px}.apptitle{font-size:22px}.logoMark{width:72px;height:48px}.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.recipeDoc{padding:14px}.docTop{flex-direction:row}.docLogo{width:78px;height:52px}.docTitle{font-size:20px}.docSub{font-size:8px;letter-spacing:.16em}.docId{font-size:9px}.recipeMeta{grid-template-columns:repeat(3,1fr)}.formGrid{grid-template-columns:1fr}}
@media(max-width:640px){body{overflow-x:auto}.app{min-width:900px}.topbar{min-width:900px}.headerrow{width:900px;flex-direction:row;align-items:center;padding:8px 10px}.brand{min-width:260px;max-width:360px}.logoMark{width:62px;height:42px;font-size:20px}.apptitle{font-size:18px}.subline{font-size:7px;letter-spacing:.16em}.controls{max-width:500px;display:flex;flex-wrap:wrap;justify-content:flex-end;width:auto}.controls .btn,.controls .syncBadge{width:auto;min-height:38px;padding:8px 10px;font-size:8.5px}#view{width:900px;padding:10px}.grid{grid-template-columns:repeat(3,1fr);gap:9px}.card{padding:12px;min-height:82px}.cardTitle{font-size:12px}.cardMeta{font-size:8px}.recipe{width:872px}.recipeTop{grid-template-columns:552px 288px;gap:10px}.recipeDoc{min-height:520px;padding:12px}.recipeMeta{grid-template-columns:repeat(3,1fr);gap:6px}.metaValue{font-size:11px}.sidePanel{display:flex}.photoBox{min-height:220px}.footer{width:900px}.modal{width:760px}.formGrid{grid-template-columns:1fr 1fr}.field textarea{min-height:280px}}
@media print{ @page{size:letter portrait;margin:.20in .18in .22in .18in} html,body{width:8.5in!important;max-width:8.5in!important;overflow:visible!important;background:#fff!important}.topbar,.footer,.back,.recipeActions,.photoActions,.statusNote,.modalBackdrop,.sidePanel{display:none!important}.app,#view{display:block!important;width:8.28in!important;max-width:8.28in!important;min-width:0!important;margin:0!important;padding:0!important;background:#fff!important;overflow:visible!important}.recipe{display:block!important;width:8.22in!important;max-width:8.22in!important;margin:0!important;padding:0!important;border:0!important;box-shadow:none!important;border-radius:0!important;overflow:visible!important}.recipeInner{padding:0!important}.recipeTop{display:block!important}.recipeDoc{width:8.18in!important;max-width:8.18in!important;margin:0!important;padding:0!important;border:0!important;border-radius:0!important;min-height:auto!important;overflow:visible!important;background:#fff!important}.docTop{margin-bottom:9pt;padding-bottom:7pt}.docLogo{width:84px;height:52px}.docTitle{font-size:23pt}.docSub{font-size:8pt}.docId{font-size:8pt}.recipeMeta{grid-template-columns:repeat(3,1fr)!important;gap:6pt;margin:7pt 0}.metaBox{padding:6pt;border:1pt solid #ddd}.metaLabel{font-size:6.9pt}.metaValue{font-size:8.4pt}.docSectionTitle{font-size:8pt;padding:5pt 7pt}.recipeText{padding:7pt;min-height:0;font-size:8.8pt;line-height:1.26;border:1pt solid #ddd}.recipeText .line{margin-bottom:2.5pt}.recipeText .sectionLine{font-size:8pt;margin:5pt 0 3pt;padding-bottom:2pt}.photoBox{display:none!important}}

</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="headerrow">
      <div class="brand">
        <div class="logoMark">HL</div>
        <div style="min-width:0">
          <div class="apptitle" id="appTitle">Huey Luey’s Prep Recipe Hub</div>
          <div class="subline" id="crumbs">Categories</div>
        </div>
      </div>
      <div class="controls">
        <button class="btn primary" id="langBtn" onclick="toggleLang()">Ver Español</button>
        <button class="btn" onclick="toggleSearch()">Search</button>
        <button class="btn orange" onclick="printCurrent()">Print</button>
        <button class="syncBadge" id="syncStatus" type="button" onclick="syncNow()"><span class="dot"></span><span id="syncText">Local Only</span></button>
      </div>
    </div>
    <div class="searchbar" id="searchWrap">
      <input id="searchInput" placeholder="Search recipes / Buscar recetas..." oninput="handleSearch()" />
      <button class="btn" onclick="clearSearch()">Clear</button>
    </div>
  </header>
  <main id="view"></main>
  <div class="footer">Huey Luey’s Recipe Hub • Tablet Recipe Manual • Print / PDF Ready</div>
</div>

<div class="modalBackdrop" id="editModal">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="editTitle">
    <div class="modalHead">
      <div class="modalTitle" id="editTitle">Edit Recipe</div>
      <button class="btn" onclick="closeEditor()">Close</button>
    </div>
    <div class="formGrid">
      <div class="field"><label>English Item Name</label><input id="editName" /></div>
      <div class="field"><label>Spanish Display Name</label><input id="editNameES" /></div>
      <div class="field"><label>English Recipe Text</label><textarea id="editEN"></textarea></div>
      <div class="field"><label>Spanish Recipe Text</label><textarea id="editES"></textarea></div>
    </div>
    <div class="modalFoot">
      <button class="btn danger" onclick="resetRecipeEdits()">Reset This Recipe</button>
      <button class="btn primary" onclick="saveRecipeEdits()">Save Recipe</button>
    </div>
  </div>
</div>

<script>
const ORIGINAL_DATA = {"Brunch": [{"name": "Candied Bacon", "EN": "ITEM NAME: Candied Bacon\nCATEGORY: Brunch Items\nPORTION SIZE: As needed\nYIELD: N/A\nPREP TIME: 5 minutes\nCOOK TIME: N/A (use cooked bacon)\nHOLD TIME: Short hot hold or room temp\nSTORAGE: Refrigerated\nCANDIED BACON GLAZE:\nBrown Sugar – 1/4 cup\nMaple Syrup – 1 tbsp\nBlack Pepper – 1/4 tsp\nCayenne – 1/4 tsp\nPREPARATION:\n1. Mix brown sugar, maple syrup, black pepper, and cayenne until smooth.\n2. Cook bacon until fully cooked and slightly crisp.\n3. Brush glaze evenly over cooked bacon.\n4. Return bacon to heat briefly if needed to set glaze.\nFINISH / SERVICE NOTES:\n• Serve warm or at room temperature.\n• Use as a brunch side or garnish.\nCRITICAL NOTES:\n• Do not burn glaze.\n• Bacon must be fully cooked before glazing.\n• Store refrigerated if holding.", "ES": "NOMBRE DEL PRODUCTO: Tocino Confitado\nCATEGORÍA: Artículos de Brunch\nPORCIÓN: Según necesidad\nRENDIMIENTO: N/A\nTIEMPO DE PREPARACIÓN: 5 minutos\nTIEMPO DE COCCIÓN: N/A (usar tocino ya cocido)\nTIEMPO DE MANTENIMIENTO: Mantener caliente por corto tiempo o a temperatura ambiente\nALMACENAMIENTO: Refrigerado\nGLASEADO DE TOCINO:\nAzúcar morena – 1/4 taza\nJarabe de maple – 1 cucharada\nPimienta negra – 1/4 cucharadita\nCayena – 1/4 cucharadita\nPREPARACIÓN:\n1. Mezclar el azúcar morena, jarabe de maple, pimienta negra y cayena hasta integrar.\n2. Cocinar el tocino hasta que esté bien cocido y ligeramente crujiente.\n3. Pincelar el glaseado sobre el tocino cocido.\n4. Regresar al calor brevemente si es necesario para fijar el glaseado.\nTERMINADO / SERVICIO:\n• Servir caliente o a temperatura ambiente.\n• Usar como acompañamiento o guarnición de brunch.\nNOTAS IMPORTANTES:\n• No quemar el glaseado.\n• El tocino debe estar completamente cocido antes de glasear.\n• Refrigerar si se va a guardar."}, {"name": "Gravy and Biscuits", "EN": "ITEM NAME: Gravy and Biscuits\nCATEGORY: Brunch Items\nPORTION SIZE: As needed\nYIELD: 1 shallow 1/4 pan\nPREP TIME: 10 minutes\nCOOK TIME: 15 minutes\nHOLD TIME: Hot hold\nSTORAGE: Refrigerated\nGRAVY INGREDIENTS:\nBreakfast Sausage – 1 lb\nFlour – 1/2 cup\nMilk – 6 cups\nBlack Pepper – 1/2 tsp\nOregano – 1/2 tsp\nCumin – 1/2 tsp\nHuey’s Hot Sauce – 1 tbsp\nGRAVY PREPARATION:\n1. Brown sausage in a pan until fully cooked.\n2. Add flour and stir, cooking for 2 minutes.\n3. Add 3 cups of milk and mix continuously for 2 minutes.\n4. Add black pepper, oregano, cumin, and hot sauce.\n5. Add remaining 3 cups of milk and stir well.\n6. Simmer for 10 minutes, stirring occasionally, until thickened.\nFINISH / SERVICE NOTES:\n• Serve hot over biscuits.\n• Stir occasionally during holding.\nCRITICAL NOTES:\n• Do not scorch gravy.\n• Keep hot while holding.\n• Discard if held improperly.", "ES": "NOMBRE DEL PRODUCTO: Salsa Blanca con Biscuits\nCATEGORÍA: Artículos de Brunch\nPORCIÓN: Según necesidad\nRENDIMIENTO: 1 bandeja 1/4 poco profunda\nTIEMPO DE PREPARACIÓN: 10 minutos\nTIEMPO DE COCCIÓN: 15 minutos\nTIEMPO DE MANTENIMIENTO: Mantener caliente\nALMACENAMIENTO: Refrigerado\nINGREDIENTES DE LA SALSA:\nSalchicha para desayuno – 1 lb\nHarina – 1/2 taza\nLeche – 6 tazas\nPimienta negra – 1/2 cucharadita\nOrégano – 1/2 cucharadita\nComino – 1/2 cucharadita\nSalsa picante Huey’s – 1 cucharada\nPREPARACIÓN DE LA SALSA:\n1. Dorar la salchicha hasta que esté bien cocida.\n2. Agregar la harina y revolver, cocinando por 2 minutos.\n3. Agregar 3 tazas de leche y mezclar continuamente por 2 minutos.\n4. Agregar la pimienta, orégano, comino y la salsa picante.\n5. Agregar las 3 tazas restantes de leche y mezclar bien.\n6. Dejar hervir a fuego lento por 10 minutos, revolviendo ocasionalmente, hasta que espese.\nTERMINADO / SERVICIO:\n• Servir caliente sobre biscuits.\n• Revolver ocasionalmente durante el mantenimiento.\nNOTAS IMPORTANTES:\n• No quemar la salsa.\n• Mantener caliente mientras esté en uso.\n• Desechar si no se mantiene correctamente."}, {"name": "Triple Stack Pancakes", "EN": "ITEM NAME: Triple Stack Pancakes & Buttermilk Syrup\nCATEGORY: Brunch Items\nPORTION SIZE: 3 pancakes per order\nYIELD: Pancake Batter – 22 qt\nPREP TIME: 15 minutes\nCOOK TIME: Cook until golden\nHOLD TIME: Short hot hold\nSTORAGE: Refrigerated\nPANCAKE BATTER:\nFlour – 4.5 qt\nBaking Powder – 3/4 cup\nSalt – 1/2 tbsp\nSugar – 1 1/4 cup\nEggs – 11 ea\nMilk – 3.75 qt\nMelted Butter – 3 cups\nVanilla Extract – 2 tbsp\nCinnamon – 2 tbsp\nPANCAKE PREPARATION:\n1. In one bowl, whisk all dry ingredients together.\n2. In a separate bowl, whisk all wet ingredients together.\n3. Fold wet ingredients into dry ingredients using a spatula.\n4. Leave batter slightly lumpy.\n5. DO NOT OVERMIX.\nBUTTERMILK SYRUP:\nUnsalted Butter – 1 lb\nSugar – 3 cups\nButtermilk – 2 cups\nCorn Syrup – 1 tbsp\nBaking Soda – 1 tbsp\nVanilla Extract – 1 tbsp\nSalt – 1 tbsp\nSYRUP PREPARATION:\n1. Melt butter in a pot over medium heat.\n2. Add sugar, buttermilk, corn syrup, and salt.\n3. Bring to a boil while stirring.\n4. Remove from heat and add baking soda and vanilla.\n5. Stir carefully as syrup will foam.\nFINISH / SERVICE NOTES:\n• Stack 3 pancakes per order.\n• Serve warm with buttermilk syrup.\nCRITICAL NOTES:\n• Do not overmix pancake batter.\n• Batter should remain slightly lumpy.\n• Serve pancakes fresh for best texture.", "ES": "NOMBRE DEL PRODUCTO: Pancakes Triple Torre y Sirope de Buttermilk\nCATEGORÍA: Artículos de Brunch\nPORCIÓN: 3 pancakes por orden\nRENDIMIENTO: Mezcla de pancakes – 22 qt\nTIEMPO DE PREPARACIÓN: 15 minutos\nTIEMPO DE COCCIÓN: Cocinar hasta dorar\nTIEMPO DE MANTENIMIENTO: Mantener caliente por corto tiempo\nALMACENAMIENTO: Refrigerado\nMEZCLA DE PANCAKES:\nHarina – 4.5 qt\nPolvo de hornear – 3/4 taza\nSal – 1/2 cucharada\nAzúcar – 1 1/4 taza\nHuevos – 11 unidades\nLeche – 3.75 qt\nMantequilla derretida – 3 tazas\nExtracto de vainilla – 2 cucharadas\nCanela – 2 cucharadas\nPREPARACIÓN DE PANCAKES:\n1. En un recipiente, batir todos los ingredientes secos.\n2. En otro recipiente, batir todos los ingredientes líquidos.\n3. Incorporar los líquidos a los secos con espátula.\n4. Dejar la mezcla ligeramente grumosa.\n5. NO SOBRE MEZCLAR.\nSIROPE DE BUTTERMILK:\nMantequilla sin sal – 1 lb\nAzúcar – 3 tazas\nButtermilk – 2 tazas\nJarabe de maíz – 1 cucharada\nBicarbonato de sodio – 1 cucharada\nExtracto de vainilla – 1 cucharada\nSal – 1 cucharada\nPREPARACIÓN DEL SIROPE:\n1. Derretir la mantequilla en una olla a fuego medio.\n2. Agregar el azúcar, buttermilk, jarabe de maíz y sal.\n3. Hervir mientras se revuelve.\n4. Retirar del fuego y agregar el bicarbonato y la vainilla.\n5. Revolver con cuidado ya que el sirope va a espumar.\nTERMINADO / SERVICIO:\n• Servir 3 pancakes por orden.\n• Servir caliente con sirope de buttermilk.\nNOTAS IMPORTANTES:\n• No sobre mezclar la masa.\n• La mezcla debe quedar ligeramente grumosa.\n• Servir fresco para mejor textura."}, {"name": "French Toast Enchiladas", "EN": "ITEM NAME: French Toast Enchiladas\nCATEGORY: Brunch Items\nPORTION SIZE: As needed\nYIELD: N/A\nPREP TIME: 15 minutes\nCOOK TIME: Cook until set\nHOLD TIME: Short hot hold\nSTORAGE: Refrigerated\nFRENCH TOAST MIXTURE:\nEggs – 6 ea\nMilk – 1 qt\nSugar – 1.5 oz\nCinnamon – 0.75 oz\nSTRAWBERRY / FILLING MIXTURE:\nHawaiian Bread – 2 bags\nCream Cheese – 1 box (3 lb)\nGranola – 1 cup\nFresh Strawberries, chopped – 1 cup\nPREPARATION:\n1. Whisk eggs, milk, sugar, and cinnamon until fully combined.\n2. Cut Hawaiian bread as needed for enchilada-style filling.\n3. Mix cream cheese until smooth.\n4. Fold chopped strawberries and granola into cream cheese.\n5. Fill bread with strawberry cream cheese mixture.\n6. Dip filled bread into french toast mixture.\n7. Cook until egg mixture is fully set and golden.\nFINISH / SERVICE NOTES:\n• Serve warm.\n• May be topped with additional strawberries or syrup.\nCRITICAL NOTES:\n• Keep egg mixture refrigerated until use.\n• Cook egg mixture fully before service.\n• Do not hold at room temperature.", "ES": "NOMBRE DEL PRODUCTO: Enchiladas de Pan Francés\nCATEGORÍA: Artículos de Brunch\nPORCIÓN: Según necesidad\nRENDIMIENTO: N/A\nTIEMPO DE PREPARACIÓN: 15 minutos\nTIEMPO DE COCCIÓN: Cocinar hasta que cuaje\nTIEMPO DE MANTENIMIENTO: Mantener caliente por corto tiempo\nALMACENAMIENTO: Refrigerado\nMEZCLA DE PAN FRANCÉS:\nHuevos – 6 unidades\nLeche – 1 qt\nAzúcar – 1.5 oz\nCanela – 0.75 oz\nMEZCLA DE FRESA / RELLENO:\nPan hawaiano – 2 bolsas\nQueso crema – 1 caja (3 lb)\nGranola – 1 taza\nFresas frescas picadas – 1 taza\nPREPARACIÓN:\n1. Batir los huevos, la leche, el azúcar y la canela hasta integrar bien.\n2. Cortar el pan hawaiano según sea necesario.\n3. Suavizar el queso crema hasta que esté manejable.\n4. Mezclar las fresas picadas y la granola con el queso crema.\n5. Rellenar el pan con la mezcla de fresa y queso crema.\n6. Remojar el pan relleno en la mezcla de pan francés.\n7. Cocinar hasta que el huevo esté bien cuajado y dorado.\nTERMINADO / SERVICIO:\n• Servir caliente.\n• Se puede acompañar con más fresas o sirope.\nNOTAS IMPORTANTES:\n• Mantener la mezcla de huevo refrigerada.\n• Cocinar completamente antes de servir.\n• No dejar a temperatura ambiente."}], "Desserts": [{"name": "Chocolate Brownie", "EN": "ITEM NAME: Chocolate Brownie\nCATEGORY: Desserts\nPORTION SIZE: 1 order\nYIELD: 15 orders\nPREP TIME: 15 minutes\nBAKE / COOK TIME: Bake until set\nHOLD TIME: Room temp or refrigerated\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nCocoa Powder – 3 cups\nOil Blend – 1 cup\nMargarine, melted – 1 lb\nCold Water – 3/4 cup\nEgg Whites – 1 cup\nSugar – 6.75 cups\nVanilla Extract – 2 tbsp\nFlour – 5.25 cups\nSalt – 1 tsp\nBaking Powder – 1 tsp\nChocolate Chips – 2 cups\nPREPARATION:\n1. In a large bowl, mix cocoa powder, oil blend, and melted margarine.\n2. Add cold water and egg whites; mix until smooth.\n3. Add sugar and vanilla extract; mix thoroughly.\n4. Add flour, salt, and baking powder; mix just until combined.\n5. Fold in chocolate chips.\n6. Pour batter into prepared baking pan.\n7. Bake until brownies are set in the center.\n8. Remove from oven and allow to cool before cutting.\nFINISH / SERVICE NOTES:\n• Cut evenly for consistent portions.\n• Serve warm or chilled as needed.\nCRITICAL NOTES:\n• Do not overmix batter.\n• Do not overbake or brownies will dry out.\n• Use clean utensils for all steps.", "ES": "NOMBRE DEL PRODUCTO: Brownie de Chocolate\nCATEGORÍA: Postres\nPORCIÓN: 1 orden\nRENDIMIENTO: 15 órdenes\nTIEMPO DE PREPARACIÓN: 15 minutos\nTIEMPO DE HORNEO / COCCIÓN: Hornear hasta que cuaje\nTIEMPO DE MANTENIMIENTO: Temperatura ambiente o refrigerado\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nCocoa en polvo – 3 tazas\nMezcla de aceite – 1 taza\nMargarina derretida – 1 lb\nAgua fría – 3/4 taza\nClaras de huevo – 1 taza\nAzúcar – 6.75 tazas\nExtracto de vainilla – 2 cucharadas\nHarina – 5.25 tazas\nSal – 1 cucharadita\nPolvo de hornear – 1 cucharadita\nChispas de chocolate – 2 tazas\nPREPARACIÓN:\n1. En un recipiente grande, mezclar el cocoa, el aceite y la margarina derretida.\n2. Agregar el agua fría y las claras de huevo; mezclar hasta que quede suave.\n3. Agregar el azúcar y la vainilla; mezclar bien.\n4. Agregar la harina, la sal y el polvo de hornear; mezclar solo hasta integrar.\n5. Incorporar las chispas de chocolate.\n6. Verter la mezcla en un molde preparado.\n7. Hornear hasta que el brownie esté cuajado al centro.\n8. Retirar del horno y dejar enfriar antes de cortar.\nTERMINADO / SERVICIO:\n• Cortar en porciones iguales.\n• Servir tibio o frío según necesidad.\nNOTAS IMPORTANTES:\n• No sobre mezclar la masa.\n• No sobre hornear para evitar resequedad.\n• Usar utensilios limpios en todo momento."}, {"name": "Tres Leches", "EN": "ITEM NAME: Tres Leches Cake\nCATEGORY: Desserts\nPORTION SIZE: As needed\nYIELD: 2 cakes\nPREP TIME: Varies\nBAKE / COOK TIME: Bake until set\nHOLD TIME: Refrigerated\nSTORAGE: Covered and refrigerated\nCAKE PROCESS:\nSugar – 1.5 cups\nVanilla Extract – 1 tbsp\nFlour – 2.5 cups\nBaking Soda – 1.5 tbsp\nEggs – 8 ea\nMilk – 2.5 cups\nTres Leches Milk – 3 qt\nHuey Luey’s Frosting – as needed\nTRES LECHES MILK:\nSweetened Condensed Milk – 3 cans\nEvaporated Milk – 3 cans\nHeavy Cream – 3 cups\nVanilla Extract – 1 cup\nWHIPPED ICING:\nHeavy Cream – 1 qt\nSugar – 1 cup\nVanilla Extract – 1 tbsp\nPREPARATION:\n1. Prepare cake batter by mixing sugar, eggs, vanilla, milk, flour, and baking soda until smooth.\n2. Pour batter into prepared pans and bake until fully set.\n3. Allow cakes to cool slightly.\n4. Mix all ingredients for tres leches milk until fully combined.\n5. Poke holes evenly across cakes.\n6. Slowly pour tres leches milk over cakes until fully absorbed.\n7. Refrigerate cakes to allow milk to soak.\n8. Prepare whipped icing by whipping heavy cream, sugar, and vanilla until fluffy.\n9. Ice cakes evenly with whipped icing or Huey Luey’s frosting as needed.\nFINISH / SERVICE NOTES:\n• Cakes should be fully chilled before cutting.\n• Flavors may vary per seasonal or special recipe.\nCRITICAL NOTES:\n• Keep cakes refrigerated at all times.\n• Pour milk slowly to avoid oversaturation.\n• Use clean utensils for all steps.", "ES": "NOMBRE DEL PRODUCTO: Pastel Tres Leches\nCATEGORÍA: Postres\nPORCIÓN: Según necesidad\nRENDIMIENTO: 2 pasteles\nTIEMPO DE PREPARACIÓN: Variable\nTIEMPO DE HORNEO / COCCIÓN: Hornear hasta que esté bien cocido\nTIEMPO DE MANTENIMIENTO: Refrigerado\nALMACENAMIENTO: Tapado y refrigerado\nPROCESO DEL PASTEL:\nAzúcar – 1.5 tazas\nExtracto de vainilla – 1 cucharada\nHarina – 2.5 tazas\nBicarbonato de sodio – 1.5 cucharadas\nHuevos – 8 unidades\nLeche – 2.5 tazas\nLeche tres leches – 3 qt\nFrosting Huey Luey’s – según necesidad\nLECHE TRES LECHES:\nLeche condensada – 3 latas\nLeche evaporada – 3 latas\nCrema espesa – 3 tazas\nExtracto de vainilla – 1 taza\nGLASEADO BATIDO:\nCrema espesa – 1 qt\nAzúcar – 1 taza\nExtracto de vainilla – 1 cucharada\nPREPARACIÓN:\n1. Preparar la mezcla del pastel combinando el azúcar, huevos, vainilla, leche, harina y bicarbonato.\n2. Verter la mezcla en moldes preparados y hornear hasta que esté bien cocido.\n3. Dejar enfriar ligeramente los pasteles.\n4. Mezclar todos los ingredientes de la leche tres leches hasta integrar bien.\n5. Picar los pasteles de manera uniforme.\n6. Verter la leche tres leches lentamente hasta que el pastel la absorba.\n7. Refrigerar para que el pastel se remoje bien.\n8. Preparar el glaseado batiendo la crema, el azúcar y la vainilla hasta que esté esponjoso.\n9. Cubrir los pasteles con el glaseado o frosting Huey Luey’s según necesidad.\nPREPARACIÓN:\n1. Preparar la mezcla del pastel combinando el azúcar, huevos, vainilla, leche, harina y bicarbonato.\n2. Verter la mezcla en moldes preparados y hornear hasta que esté bien cocido.\n3. Dejar enfriar ligeramente los pasteles.\n4. Mezclar todos los ingredientes de la leche tres leches hasta integrar bien.\n5. Picar los pasteles de manera uniforme.\n6. Verter la leche tres leches lentamente hasta que el pastel la absorba.\n7. Refrigerar para que el pastel se remoje bien.\n8. Preparar el glaseado batiendo la crema, el azúcar y la vainilla hasta que esté esponjoso.\n9. Cubrir los pasteles con el glaseado o frosting Huey Luey’s según necesidad.\nTERMINADO / SERVICIO:\n• Refrigerar bien antes de cortar.\n• Los sabores pueden variar según receta especial o temporada.\nNOTAS IMPORTANTES:\n• Mantener refrigerado en todo momento.\n• Verter la leche lentamente para evitar exceso.\n• Usar utensilios limpios en todo el proceso."}, {"name": "Flan", "EN": "ITEM NAME: Flan\nCATEGORY: Desserts\nPORTION SIZE: 1 flan\nYIELD: 18 flans\nPREP TIME: 15 minutes\nBAKE / COOK TIME: Bake until set\nHOLD TIME: Refrigerated\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nSweetened Condensed Milk – 4 cans\nMilk – 4 cups\nEggs – 16 ea\nVanilla Extract – 1/4 cup\nSugar – 24 oz\nPREPARATION:\n1. Melt sugar over medium heat until fully caramelized.\n2. Pour caramel into flan molds, coating the bottom evenly.\n3. In a bowl or blender, mix condensed milk, milk, eggs, and vanilla until smooth.\n4. Pour mixture into prepared flan molds.\n5. Place molds in a water bath.\n6. Bake until flan is set but slightly jiggly in the center.\n7. Remove from oven and allow to cool completely.\n8. Refrigerate before serving.\nFINISH / SERVICE NOTES:\n• Chill thoroughly before unmolding.\n• Serve inverted with caramel sauce.\nCRITICAL NOTES:\n• Do not overbake or flan will become rubbery.\n• Keep refrigerated at all times.\n• Use clean utensils to avoid contamination.", "ES": "NOMBRE DEL PRODUCTO: Flan\nCATEGORÍA: Postres\nPORCIÓN: 1 flan\nRENDIMIENTO: 18 flanes\nTIEMPO DE PREPARACIÓN: 15 minutos\nTIEMPO DE HORNEO / COCCIÓN: Hornear hasta que cuaje\nTIEMPO DE MANTENIMIENTO: Refrigerado\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nLeche condensada – 4 latas\nLeche – 4 tazas\nHuevos – 16 unidades\nExtracto de vainilla – 1/4 taza\nAzúcar – 24 oz\nPREPARACIÓN:\n1. Derretir el azúcar a fuego medio hasta que se haga caramelo.\n2. Verter el caramelo en los moldes de flan cubriendo el fondo.\n3. En un recipiente o licuadora, mezclar la leche condensada, la leche, los huevos y la vainilla hasta que quede suave.\n4. Verter la mezcla en los moldes preparados.\n5. Colocar los moldes en baño maría.\n6. Hornear hasta que el flan esté cuajado pero ligeramente tembloroso en el centro.\n7. Retirar del horno y dejar enfriar completamente.\n8. Refrigerar antes de servir.\nTERMINADO / SERVICIO:\n• Refrigerar bien antes de desmoldar.\n• Servir volteado con el caramelo.\nNOTAS IMPORTANTES:\n• No sobre hornear para evitar textura dura.\n• Mantener refrigerado en todo momento.\n• Usar utensilios limpios para evitar contaminación."}, {"name": "Pumpkin Flan", "EN": "ITEM NAME: Pumpkin Flan\nCATEGORY: Desserts\nPORTION SIZE: 1 flan\nYIELD: 18 flans\nPREP TIME: 15 minutes\nBAKE / COOK TIME: Bake until set\nHOLD TIME: Refrigerated\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nSweetened Condensed Milk – 2.5 cans\nWhole Milk – 4 cups\nEggs – 8 ea\nVanilla Extract – 1.5 oz\nSugar – 1/2 cup\nBrown Sugar – 1/2 cup\nPumpkin Purée – 1.5 cans\nGround Ginger – 1 pinch\nGround Nutmeg – 1 pinch\nPREPARATION:\n1. Combine sugar and brown sugar and caramelize evenly.\n2. Pour caramel into flan molds, coating the bottom.\n3. In a bowl or blender, mix condensed milk, whole milk, eggs, vanilla, pumpkin purée, ginger, and nutmeg until smooth.\n4. Pour mixture into prepared flan molds.\n5. Place molds in a water bath.\n6. Bake until flan is set but slightly jiggly in the center.\n7. Remove from oven and cool completely.\n8. Refrigerate before serving.\nFINISH / SERVICE NOTES:\n• Chill thoroughly before unmolding.\n• Serve inverted with caramel sauce.\nCRITICAL NOTES:\n• Do not overbake or flan will be rubbery.\n• Keep refrigerated at all times.\n• Use clean utensils to avoid contamination.", "ES": "NOMBRE DEL PRODUCTO: Flan de Calabaza\nCATEGORÍA: Postres\nPORCIÓN: 1 flan\nRENDIMIENTO: 18 flanes\nTIEMPO DE PREPARACIÓN: 15 minutos\nTIEMPO DE HORNEO / COCCIÓN: Hornear hasta que cuaje\nTIEMPO DE MANTENIMIENTO: Refrigerado\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nLeche condensada – 2.5 latas\nLeche entera – 4 tazas\nHuevos – 8 unidades\nExtracto de vainilla – 1.5 oz\nAzúcar – 1/2 taza\nAzúcar morena – 1/2 taza\nPuré de calabaza – 1.5 latas\nJengibre molido – 1 pizca\nNuez moscada molida – 1 pizca\nPREPARACIÓN:\n1. Mezclar el azúcar y el azúcar morena y caramelizar de manera uniforme.\n2. Verter el caramelo en los moldes de flan cubriendo el fondo.\n3. En un recipiente o licuadora, mezclar la leche condensada, leche entera, huevos, vainilla, puré de calabaza, jengibre y nuez moscada hasta que quede suave.\n4. Verter la mezcla en los moldes preparados.\n5. Colocar los moldes en baño maría.\n6. Hornear hasta que el flan esté cuajado pero ligeramente tembloroso al centro.\n7. Retirar del horno y dejar enfriar completamente.\n8. Refrigerar antes de servir.\nTERMINADO / SERVICIO:\n• Refrigerar bien antes de desmoldar.\n• Servir volteado con el caramelo.\nNOTAS IMPORTANTES:\n• No sobre hornear para evitar textura dura.\n• Mantener refrigerado en todo momento.\n• Usar utensilios limpios para evitar contaminación."}], "Entree Prep": [{"name": "Mexican Fried Chicken", "EN": "ITEM NAME: Mexican Fried Chicken\nCATEGORY: Entrée Prep\nPORTION SIZE: As needed\nYIELD: Per every 4 chicken breasts\nCOOK TIME: Fry until fully cooked\nHOLD TIME: N/A (cook to order)\nSTORAGE: Covered and refrigerated (raw product)\nMARINADE / PREPARATION:\nButtermilk – 2 cups\nCayenne – 1 tsp\nPaprika – 1 tbsp\nGarlic Powder – 2 tbsp\nKosher Salt – 1 tbsp\nDRY BREADING:\nFlour – 2 cups\nKosher Salt – 2 tsp\nPaprika – 1.5 tsp\nCayenne – 1 tsp\nGarlic Powder – 2 tsp\nBlack Pepper – 1/2 tsp\nCumin – 1/2 tsp\nPREPARATION:\n1. Mix all marinade ingredients in a container.\n2. Add chicken breasts and coat completely.\n3. Marinate according to operation standards.\n4. In a separate container, mix all dry breading ingredients.\n5. Remove chicken from marinade and allow excess to drip off.\n6. Coat chicken fully in dry breading.\n7. Place breaded chicken on trays, cover, and refrigerate until frying.\nCOOKING / FINISHING NOTES:\n• Fry until golden brown and crispy.\n• Chicken must be fully cooked inside.\n• Do not overcrowd fryer.\nCRITICAL NOTES:\n• Keep raw chicken refrigerated at all times.\n• Do not reuse wet breading.\n• Chicken must be fully cooked before service.\n• Cook to order for best quality.", "ES": "NOMBRE DEL PRODUCTO: Pollo Frito Mexicano\nCATEGORÍA: Preparación de Entradas\nPORCIÓN: Según necesidad\nRENDIMIENTO: Por cada 4 pechugas de pollo\nTIEMPO DE COCCIÓN: Freír hasta bien cocido\nTIEMPO DE MANTENIMIENTO: N/A (cocinar al momento)\nALMACENAMIENTO: Tapado y refrigerado (producto crudo)\nMARINADO / PREPARACIÓN:\nSuero de leche (buttermilk) – 2 tazas\nCayena – 1 cucharadita\nPaprika – 1 cucharada\nAjo en polvo – 2 cucharadas\nSal kosher – 1 cucharada\nEMPANIZADO SECO:\nHarina – 2 tazas\nSal kosher – 2 cucharaditas\nPaprika – 1.5 cucharaditas\nCayena – 1 cucharadita\nAjo en polvo – 2 cucharaditas\nPimienta negra – 1/2 cucharadita\nComino – 1/2 cucharadita\nPREPARACIÓN:\n1. Mezclar todos los ingredientes del marinado en un recipiente.\n2. Agregar las pechugas de pollo y cubrir completamente.\n3. Marinar según el estándar de la operación.\n4. En otro recipiente, mezclar todos los ingredientes del empanizado seco.\n5. Sacar el pollo del marinado y dejar escurrir el exceso.\n6. Empanizar completamente el pollo.\n7. Colocar el pollo empanizado en charolas, tapar y refrigerar hasta freír.\nNOTAS DE COCCIÓN / TERMINADO:\n• Freír hasta que quede dorado y crujiente.\n• El pollo debe quedar completamente cocido por dentro.\n• No sobrecargar la freidora.\nNOTAS IMPORTANTES:\n• Mantener el pollo crudo siempre refrigerado.\n• No reutilizar empanizado húmedo.\n• El pollo debe quedar completamente cocido antes de servir.\n• Cocinar al momento para mejor calidad."}, {"name": "Chorizo Stuffed Chicken", "EN": "ITEM NAME: Stuffed Chicken (Chorizo Mix)\nCATEGORY: Entrée Prep\nPORTION SIZE: 1 stuffed chicken breast\nYIELD: 36 chicken breasts\nCOOK TIME: Cook until chicken is fully done\nHOLD TIME: N/A (cook to order)\nSTORAGE: Covered and refrigerated (raw prep)\nINGREDIENTS – STUFFING MIX:\nChorizo – 4 lb\nShredded Cheese – 2 lb\nINGREDIENTS – BREADING:\nPanko – 1 qt\nLawry’s Seasoning – 1 tbsp\nINGREDIENTS – EGG WASH:\nEggs – 9 ea\nWater – 2 cups\nLawry’s Seasoning – 1 tbsp\nPREPARATION / PROCEDURE:\n1. Cook chorizo fully in a pan.\n2. Drain excess grease from chorizo.\n3. Combine cooked chorizo with shredded cheese and mix well.\n4. Butterfly chicken breasts as needed.\n5. Stuff each chicken breast evenly with chorizo mixture.\n6. In a bowl, mix eggs, water, and Lawry’s seasoning.\n7. Dip stuffed chicken into egg wash.\n8. Coat evenly with panko breading.\n9. Place breaded chicken on sheet trays.\nPAR-BAKE (INITIAL COOK):\n10. Bake chicken at 325°F for 45 minutes until fully cooked.\n11. Remove from oven and allow to cool.\n12. Cover and refrigerate until service.\nREHEAT / SERVICE:\n13. Fry par-baked chicken until heated through and golden brown.\n14. Drain excess oil before plating.\nCRITICAL NOTES:\n• Chorizo must be fully cooked before stuffing.\n• Chicken must be fully cooked during baking stage.\n• Frying is for reheating and golden crust only.\n• Do not overstuff chicken.\n• Keep chicken refrigerated until frying.", "ES": "NOMBRE DEL PRODUCTO: Pollo Relleno (Mezcla de Chorizo)\nCATEGORÍA: Preparación de Entradas\nTAMAÑO DE PORCIÓN: 1 pechuga de pollo rellena\nRENDIMIENTO: 36 pechugas de pollo\nTIEMPO DE COCCIÓN: Cocinar hasta que el pollo esté completamente cocido\nTIEMPO DE MANTENIMIENTO: N/A (cocinar al momento)\nALMACENAMIENTO: Tapado y refrigerado (preparación cruda)\nINGREDIENTES – MEZCLA DE RELLENO:\nChorizo – 4 lb\nQueso rallado – 2 lb\nINGREDIENTES – EMPANIZADO:\nPanko – 1 qt\nSazonador Lawry’s – 1 cucharada\nINGREDIENTES – BAÑO DE HUEVO:\nHuevos – 9 unidades\nAgua – 2 tazas\nSazonador Lawry’s – 1 cucharada\nPREPARACIÓN / PROCEDIMIENTO:\n1. Cocinar completamente el chorizo en una sartén.\n2. Escurrir el exceso de grasa del chorizo.\n3. Combinar el chorizo cocido con el queso rallado y mezclar bien.\n4. Abrir las pechugas de pollo en mariposa según sea necesario.\n5. Rellenar cada pechuga de pollo de manera pareja con la mezcla de chorizo.\n6. En un recipiente, mezclar los huevos, el agua y el sazonador Lawry’s.\n7. Pasar el pollo relleno por el baño de huevo.\n8. Cubrir uniformemente con empanizado panko.\n9. Colocar el pollo empanizado en charolas.\nHORNEADO PARCIAL (COCCIÓN INICIAL):\n10. Hornear el pollo a 325°F por 45 minutos hasta que esté completamente cocido.\n11. Retirar del horno y dejar enfriar.\n12. Tapar y refrigerar hasta el servicio.\nRECALENTADO / SERVICIO:\n13. Freír el pollo previamente horneado hasta que esté bien caliente y dorado.\n14. Escurrir el exceso de aceite antes de emplatar.\nNOTAS IMPORTANTES:\n• El chorizo debe estar completamente cocido antes de rellenar.\n• El pollo debe estar completamente cocido durante la etapa de horneado.\n• La fritura es solo para recalentar y dorar la corteza.\n• No sobre rellenar el pollo.\n• Mantener el pollo refrigerado hasta freír."}, {"name": "Coconut Shrimp", "EN": "ITEM NAME: Coconut Shrimp\nCATEGORY: Entrée Prep\nPORTION SIZE: As needed\nYIELD: Based on 4 lb shrimp\nCOOK TIME: Fry until golden and shrimp is cooked\nHOLD TIME: N/A (cook to order)\nSTORAGE: Covered and refrigerated (raw prep)\nINGREDIENTS – MARINADE:\nCoco Lopez – 2 cups\nChipotle Powder – 3 tbsp\nLawry’s Seasoning – 1 tbsp\nLime Juice – 2 tbsp\nShrimp – 4 lb\nINGREDIENTS – DRY BREADING:\nPanko – 2 qt\nShredded Coconut – 2 cups\nLawry’s Seasoning – 2 tbsp\nChipotle Powder – 4 tbsp\nINGREDIENTS – EGG WASH:\nEggs – 4 ea\nMilk – 1 cup\nLawry’s Seasoning – 1 tbsp\nPREPARATION / PROCEDURE:\n1. In a container, combine Coco Lopez, chipotle powder, Lawry’s seasoning, and lime juice.\n2. Add shrimp to marinade and coat evenly.\n3. Refrigerate shrimp in marinade.\n4. In a separate bowl, combine panko, shredded coconut, Lawry’s seasoning, and chipotle powder.\n5. In another bowl, whisk eggs, milk, and Lawry’s seasoning.\n6. Remove shrimp from marinade.\n7. Dip shrimp into egg wash.\n8. Coat shrimp in dry breading, pressing lightly to adhere.\n9. Refrigerate breaded shrimp until ready to cook.\nCOOKING / SERVICE:\n• Fry to order until golden brown and shrimp is fully cooked.\n• Do not overcrowd fryer.\nCRITICAL NOTES:\n• Shrimp must be fully cooked before service.\n• Keep shrimp cold at all times until frying.\n• Cook to order for best texture and crispness.\n• Store raw, breaded shrimp covered and refrigerated.", "ES": "NOMBRE DEL PRODUCTO: Camarón Empanizado de Coco\nCATEGORÍA: Preparación de Entradas\nTAMAÑO DE PORCIÓN: Según necesidad\nRENDIMIENTO: Basado en 4 lb de camarón\nTIEMPO DE COCCIÓN: Freír hasta dorar y que el camarón esté cocido\nTIEMPO DE MANTENIMIENTO: N/A (cocinar al momento)\nALMACENAMIENTO: Tapado y refrigerado (preparación cruda)\nINGREDIENTES – MARINADO:\nCoco Lopez – 2 tazas\nChile chipotle en polvo – 3 cucharadas\nSazonador Lawry’s – 1 cucharada\nJugo de limón – 2 cucharadas\nCamarón – 4 lb\nINGREDIENTES – EMPANIZADO SECO:\nPanko – 2 cuartos\nCoco rallado – 2 tazas\nSazonador Lawry’s – 2 cucharadas\nChile chipotle en polvo – 4 cucharadas\nINGREDIENTES – BAÑO DE HUEVO:\nHuevos – 4 unidades\nLeche – 1 taza\nSazonador Lawry’s – 1 cucharada\nPREPARACIÓN / PROCEDIMIENTO:\n1. En un recipiente, mezclar el Coco Lopez, chile chipotle, sazonador Lawry’s y jugo de limón.\n2. Agregar el camarón al marinado y cubrir bien.\n3. Refrigerar el camarón en el marinado.\n4. En otro recipiente, mezclar el panko, coco rallado, sazonador Lawry’s y chile chipotle.\n5. En otro recipiente, batir los huevos, la leche y el sazonador Lawry’s.\n6. Sacar el camarón del marinado.\n7. Pasar el camarón por el baño de huevo.\n8. Empanizar el camarón en la mezcla seca, presionando ligeramente.\n9. Refrigerar el camarón empanizado hasta el momento de cocinar.\nCOCCIÓN / SERVICIO:\n• Freír al momento hasta que esté dorado y el camarón bien cocido.\n• No sobrecargar la freidora.\nNOTAS IMPORTANTES:\n• El camarón debe estar completamente cocido antes de servir.\n• Mantener el camarón frío en todo momento hasta freír.\n• Cocinar al momento para mejor textura y crocancia.\n• Mantener tapado y refrigerado durante el almacenamiento."}, {"name": "Bacon Wrapped Shrimp", "EN": "ITEM NAME: Bacon Wrapped Shrimp\nCATEGORY: Entrée Prep\nPORTION SIZE: 12 pieces per portion bag\nYIELD: As needed\nCOOK TIME: Cook until shrimp is done and bacon is crisp\nHOLD TIME: N/A (cook to order)\nSTORAGE: Covered and refrigerated (raw prep)\nINGREDIENTS:\nShrimp 16/20 (tail off) – 12 ea per portion\nBacon – 12 full slices\nWhite Cheese Slices – 12 slices\nJalapeño Slices – 12 slices\nPREPARATION / PROCEDURE:\n1. Lay shrimp flat and pat completely dry.\n2. Place one slice of white cheese and one slice of jalapeño on each shrimp.\n3. Wrap each shrimp tightly with one full slice of bacon.\n4. Secure wrap if needed.\n5. Portion 12 wrapped shrimp per bag.\n6. Cover and refrigerate until ready to cook.\nCOOKING / SERVICE:\n• Cook to order until shrimp is opaque and bacon is fully crisp.\n• May be grilled, baked, or cooked on flat top per service needs.\nCRITICAL NOTES:\n• Bacon must be fully cooked before service.\n• Do not overcook shrimp.\n• Keep raw shrimp cold at all times until cooking.\n• Store covered in refrigeration.", "ES": "NOMBRE DEL PRODUCTO: Camarón Envuelto en Tocino\nCATEGORÍA: Preparación de Entradas\nTAMAÑO DE PORCIÓN: 12 piezas por bolsa\nRENDIMIENTO: Según necesidad\nTIEMPO DE COCCIÓN: Cocinar hasta que el camarón esté cocido y el tocino crujiente\nTIEMPO DE MANTENIMIENTO: N/A (cocinar al momento)\nALMACENAMIENTO: Tapado y refrigerado (preparación cruda)\nINGREDIENTES:\nCamarón 16/20 (sin cola) – 12 ea por porción\nTocino – 12 tiras completas\nQueso blanco en rebanadas – 12 rebanadas\nRodajas de jalapeño – 12 rebanadas\nPREPARACIÓN / PROCEDIMIENTO:\n1. Colocar los camarones planos y secarlos bien.\n2. Colocar una rebanada de queso blanco y una rodaja de jalapeño sobre cada camarón.\n3. Envolver cada camarón firmemente con una tira completa de tocino.\n4. Asegurar el envoltorio si es necesario.\n5. Porcionar 12 camarones envueltos por bolsa.\n6. Tapar y refrigerar hasta el momento de cocinar.\nCOCCIÓN / SERVICIO:\n• Cocinar al momento hasta que el camarón esté opaco y el tocino bien cocido.\n• Se puede cocinar a la parrilla, al horno o en plancha según el servicio.\nNOTAS IMPORTANTES:\n• El tocino debe estar completamente cocido antes de servir.\n• No sobrecocinar el camarón.\n• Mantener el camarón crudo frío en todo momento hasta cocinar.\n• Mantener tapado durante el almacenamiento."}, {"name": "Chipotle Mashed Potatoes", "EN": "ITEM NAME: Chipotle Mashed Potatoes\nCATEGORY: Entrée Prep\nPORTION SIZE: As needed\nYIELD: 12 qt\nCOOK TIME: Boil until tender\nHOLD TIME: Hot hold\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nRed Potatoes – 15 lbs\nMilk – 1.5 cups\nHeavy Cream – 1.5 cups\nCream Cheese – 0.5 lb\nSour Cream – 2 cups\nCheese Dip – 2 cups\nMargarine – 0.5 lb\nChipotle Adobo Sauce – 1 can\nSalt – 5 tbsp\nBlack Pepper – 1 tbsp\nPREPARATION / PROCEDURE:\n1. Wash and cut red potatoes into even-sized pieces.\n2. Place potatoes into a large pot and cover with water.\n3. Boil until potatoes are fork-tender.\n4. Drain potatoes thoroughly.\n5. Add margarine, milk, heavy cream, and cream cheese.\n6. Mash potatoes while hot until smooth.\n7. Add sour cream, cheese dip, and chipotle adobo sauce.\n8. Season with salt and black pepper.\n9. Mix until fully smooth and evenly combined.\nFINISH / HOLDING:\n• Hold hot for service.\n• If cooling, cool rapidly and refrigerate promptly.\nCRITICAL NOTES:\n• Mash potatoes while hot for best texture.\n• Do not over-mix or potatoes will become gummy.\n• Adjust thickness with milk or cream if needed.\n• Reheat gently, stirring often.\n• Keep covered at all times.", "ES": "NOMBRE DEL PRODUCTO: Puré de Papa con Chipotle\nCATEGORÍA: Preparación de Entradas\nTAMAÑO DE PORCIÓN: Según necesidad\nRENDIMIENTO: 12 cuartos\nTIEMPO DE COCCIÓN: Hervir hasta que estén suaves\nTIEMPO DE MANTENIMIENTO: Mantener caliente\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nPapas rojas – 15 lb\nLeche – 1.5 tazas\nCrema espesa – 1.5 tazas\nQueso crema – 0.5 lb\nCrema agria – 2 tazas\nQueso dip – 2 tazas\nMargarina – 0.5 lb\nSalsa de chipotle en adobo – 1 lata\nSal – 5 cucharadas\nPimienta negra – 1 cucharada\nPREPARACIÓN / PROCEDIMIENTO:\n1. Lavar y cortar las papas rojas en piezas del mismo tamaño.\n2. Colocar las papas en una olla grande y cubrir con agua.\n3. Hervir hasta que estén suaves al pinchar con tenedor.\n4. Escurrir bien las papas.\n5. Agregar la margarina, la leche, la crema espesa y el queso crema.\n6. Machacar las papas mientras estén calientes hasta que queden suaves.\n7. Agregar la crema agria, el queso dip y la salsa de chipotle en adobo.\n8. Sazonar con sal y pimienta negra.\n9. Mezclar hasta que quede completamente suave y bien integrado.\nTERMINADO / MANTENIMIENTO:\n• Mantener caliente para el servicio.\n• Si se enfría, enfriar rápidamente y refrigerar.\nNOTAS IMPORTANTES:\n• Machacar las papas mientras estén calientes para mejor textura.\n• No mezclar en exceso o el puré quedará pegajoso.\n• Ajustar la consistencia con leche o crema si es necesario.\n• Recalentar suavemente, revolviendo con frecuencia.\n• Mantener tapado en todo momento."}, {"name": "Cilantro Lime Rice", "EN": "ITEM NAME: Cilantro Lime Rice\nCATEGORY: Entrée Prep\nPORTION SIZE: As needed\nYIELD: 1 full pan\nCOOK TIME: Simmer until rice is tender\nHOLD TIME: Hot hold\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nLong Grain Rice – 2.5 qt\nWater – 5 qt\nFresh Squeezed Lime Juice – 1 ea\nSalt – 5 tbsp\nGarlic Powder – 4 tbsp\nOnion, diced – 2 cups\nPREPARATION / PROCEDURE:\n1. Add long grain rice and water to a pot or rice cooker.\n2. Add diced onion, salt, and garlic powder.\n3. Bring to a boil.\n4. Reduce heat to a simmer.\n5. Cook until rice is fully tender and liquid is absorbed.\n6. Add fresh squeezed lime juice.\n7. Mix gently to combine.\n8. Fluff rice before service.\nFINISH / HOLDING:\n• Hold hot for service.\n• If cooling, cool rapidly and refrigerate promptly.\nCRITICAL NOTES:\n• Add lime juice only after rice is fully cooked.\n• Rice should be fluffy, not mushy.\n• Do not over-stir.\n• Reheat thoroughly before service.\n• Keep covered at all times.", "ES": "NOMBRE DEL PRODUCTO: Arroz con Cilantro y Limón\nCATEGORÍA: Preparación de Entradas\nTAMAÑO DE PORCIÓN: Según necesidad\nRENDIMIENTO: 1 bandeja completa\nTIEMPO DE COCCIÓN: Hervir a fuego lento hasta que el arroz esté suave\nTIEMPO DE MANTENIMIENTO: Mantener caliente\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nArroz de grano largo – 2.5 cuartos\nAgua – 5 cuartos\nJugo de limón recién exprimido – 1 unidad\nSal – 5 cucharadas\nAjo en polvo – 4 cucharadas\nCebolla picada – 2 tazas\nPREPARACIÓN / PROCEDIMIENTO:\n1. Colocar el arroz de grano largo y el agua en una olla o arrocera.\n2. Agregar la cebolla picada, la sal y el ajo en polvo.\n3. Llevar a hervor.\n4. Bajar el fuego y cocinar a fuego lento.\n5. Cocinar hasta que el arroz esté completamente suave y el líquido se haya absorbido.\n6. Agregar el jugo de limón recién exprimido.\n7. Mezclar suavemente.\n8. Esponjar el arroz antes de servir.\nTERMINADO / MANTENIMIENTO:\n• Mantener caliente para el servicio.\n• Si se enfría, enfriar rápidamente y refrigerar.\nNOTAS IMPORTANTES:\n• Agregar el jugo de limón solo después de que el arroz esté completamente cocido.\n• El arroz debe quedar suelto, no pastoso.\n• No revolver en exceso.\n• Recalentar completamente antes de servir.\n• Mantener tapado en todo momento."}, {"name": "Mexican Rice", "EN": "ITEM NAME: Mexican Rice\nCATEGORY: Entrée Prep\nPORTION SIZE: As needed\nYIELD: 3 full pans\nCOOK TIME: Simmer until rice is tender\nHOLD TIME: Hot hold\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nLong Grain Rice – 9 qt\nSalt – 10 tbsp\nGarlic Powder – 4 tbsp\nWater – 18 qt\nFrozen Vegetables – 5 qt\nChicken Broth – 6 qt\nTomato Purée – 3 cups\nPREPARATION / PROCEDURE:\n1. Add long grain rice to a large pot or rice cooker.\n2. Add water, chicken broth, and tomato purée.\n3. Add salt and garlic powder.\n4. Mix gently until evenly combined.\n5. Bring to a boil.\n6. Reduce heat to a simmer.\n7. Add frozen vegetables and stir gently.\n8. Cover and cook until rice is fully tender and liquid is absorbed.\n9. Fluff rice before service.\nFINISH / HOLDING:\n• Hold hot for service.\n• If cooling, cool rapidly and refrigerate promptly.\nCRITICAL NOTES:\n• Stir gently to avoid breaking rice.\n• Rice should be fluffy, not mushy.\n• Do not over-stir during cooking.\n• Reheat thoroughly before service.\n• Keep covered at all times.", "ES": "NOMBRE DEL PRODUCTO: Arroz Mexicano\nCATEGORÍA: Preparación de Entradas\nTAMAÑO DE PORCIÓN: Según necesidad\nRENDIMIENTO: 3 bandejas completas\nTIEMPO DE COCCIÓN: Hervir a fuego lento hasta que el arroz esté suave\nTIEMPO DE MANTENIMIENTO: Mantener caliente\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nArroz de grano largo – 9 cuartos\nSal – 10 cucharadas\nAjo en polvo – 4 cucharadas\nAgua – 18 cuartos\nVegetales congelados – 5 cuartos\nCaldo de pollo – 6 cuartos\nPuré de tomate – 3 tazas\nPREPARACIÓN / PROCEDIMIENTO:\n1. Colocar el arroz de grano largo en una olla grande o arrocera.\n2. Agregar el agua, el caldo de pollo y el puré de tomate.\n3. Agregar la sal y el ajo en polvo.\n4. Mezclar suavemente hasta integrar.\n5. Llevar a hervor.\n6. Bajar el fuego y cocinar a fuego lento.\n7. Agregar los vegetales congelados y mezclar suavemente.\n8. Tapar y cocinar hasta que el arroz esté completamente suave y el líquido se haya absorbido.\n9. Esponjar el arroz antes de servir.\nTERMINADO / MANTENIMIENTO:\n• Mantener caliente para el servicio.\n• Si se enfría, enfriar rápidamente y refrigerar.\nNOTAS IMPORTANTES:\n• Revolver suavemente para no romper el arroz.\n• El arroz debe quedar suelto, no pastoso.\n• No revolver en exceso durante la cocción.\n• Recalentar completamente antes de servir.\n• Mantener tapado en todo momento."}, {"name": "Birria Brisket", "EN": "ITEM NAME: Birria Brisket\nCATEGORY: Entrée Prep\nPORTION SIZE: As needed\nYIELD: N/A\nCOOK TIME: Low and slow\nHOLD TIME: Hot hold\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nBeef Chuck – 20 lbs\nTomatoes – 8 lbs\nOnions – 4 lbs\nWhole Oregano – 4 tbsp\nCumin – 4 tbsp\nSalt – 4 tbsp\nChicken Base – 4 tbsp\nBlack Pepper – 4 tbsp\nGuajillo Chiles (seedless) – 32 ea\nAncho Chiles (seedless) – 12 ea\nChile de Árbol – 10 ea\nWhite Vinegar – 8 tbsp\nGarlic Cloves – 40 ea\nCinnamon Stick – 1 ea\nBay Leaves – 8 ea\nWater – as needed\nPREPARATION / PROCEDURE:\n1. Remove stems and seeds from guajillo and ancho chiles.\n2. Place chiles, tomatoes, onions, garlic, cinnamon stick, and bay leaves into a large pot.\n3. Add enough water to fully cover ingredients.\n4. Bring to a boil, then reduce to a simmer.\n5. Simmer until vegetables and chiles are fully softened.\n6. Blend mixture until completely smooth to form birria sauce.\n7. Season sauce with oregano, cumin, salt, black pepper, chicken base, and white vinegar.\n8. Add beef chuck to the sauce.\n9. Cook low and slow until beef is fully tender and shreddable.\n10. Strain beef from liquid.\n11. Reserve strained liquid as birria consommé broth.\n12. Remove bay leaves and cinnamon stick.\n13. Shred beef and return meat to sauce as needed for service.\nFINISH / HOLDING:\n• Hold meat hot for service.\n• Hold consommé hot for service or cool rapidly.\n• If cooling, refrigerate meat and consommé separately, covered.\nCRITICAL NOTES:\n• Simmer gently; do not boil hard.\n• Meat should shred easily when fully cooked.\n• Strain carefully to keep consommé clean.\n• Remove bay leaves and cinnamon stick before service.\n• Adjust seasoning after shredding meat if needed.\n• Keep everything covered at all times.", "ES": "NOMBRE DEL PRODUCTO: Brisket de Birria\nCATEGORÍA: Preparación de Entradas\nTAMAÑO DE PORCIÓN: Según necesidad\nRENDIMIENTO: N/A\nTIEMPO DE COCCIÓN: Lento y a fuego bajo\nTIEMPO DE MANTENIMIENTO: Mantener caliente\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nCarne de res (Chuck) – 20 lb\nTomates – 8 lb\nCebolla – 4 lb\nOrégano entero – 4 cucharadas\nComino – 4 cucharadas\nSal – 4 cucharadas\nBase de pollo – 4 cucharadas\nPimienta negra – 4 cucharadas\nChiles guajillo (sin semilla) – 32 ea\nChiles anchos (sin semilla) – 12 ea\nChile de árbol – 10 ea\nVinagre blanco – 8 cucharadas\nDientes de ajo – 40 ea\nRaja de canela – 1 ea\nHojas de laurel – 8 ea\nAgua – según sea necesario\nPREPARACIÓN / PROCEDIMIENTO:\n1. Quitar tallos y semillas a los chiles guajillo y ancho.\n2. Colocar los chiles, tomates, cebolla, ajo, canela y hojas de laurel en una olla grande.\n3. Agregar agua suficiente para cubrir todos los ingredientes.\n4. Llevar a hervor y luego bajar a fuego lento.\n5. Cocinar hasta que los vegetales y chiles estén suaves.\n6. Licuar la mezcla hasta que quede completamente suave para formar la salsa de birria.\n7. Sazonar la salsa con orégano, comino, sal, pimienta negra, base de pollo y vinagre blanco.\n8. Agregar la carne a la salsa.\n9. Cocinar lentamente hasta que la carne esté muy suave y se pueda deshebrar.\n10. Colar la carne y separar el líquido.\n11. Guardar el líquido colado como caldo/consomé de birria.\n12. Retirar la canela y las hojas de laurel.\n13. Deshebrar la carne y regresar a la salsa según sea necesario para el servicio.\nTERMINADO / MANTENIMIENTO:\n• Mantener la carne caliente para el servicio.\n• Mantener el consomé caliente o enfriar rápidamente.\n• Si se enfría, refrigerar carne y consomé por separado, tapados.\nNOTAS IMPORTANTES:\n• Cocinar a fuego lento; no hervir fuerte.\n• La carne debe deshebrarse fácilmente cuando esté lista.\n• Colar cuidadosamente para mantener el consomé limpio.\n• Retirar la canela y las hojas de laurel antes de servir.\n• Ajustar sazón después de deshebrar si es necesario.\n• Mantener todo tapado en todo momento."}, {"name": "Regular Brisket", "EN": "ITEM NAME: Regular Brisket\nCATEGORY: Entrée Prep\nPORTION SIZE: As needed\nYIELD: 3 full pans\nCOOK TIME: Low and slow\nHOLD TIME: Hot hold\nSTORAGE: Covered and refrigerated\nINGREDIENTS – BRISKET COOK:\nBeef Brisket – 40 lbs\nWater – 16 qt\nBeef Base – 2 cups\nINGREDIENTS – SAUCE:\nReserved Brisket Water – use 1/2 of remaining\nAdditional Water – 12 qt (to reduce greasiness)\nBeef Base – 1 cup\nGround Oregano – 1 cup\nPaprika – 1 cup\nFlour – 3 cups\nChili Powder – 1.5 cups\nCumin – 1.5 cups\nGarlic Powder – 1/4 cup\nSalt – 1/4 cup\nDiced Onion – 2 qt\nDiced Bell Pepper – 2 qt\nOil – 4 cups\nPREPARATION / PROCEDURE:\n1. Place brisket into a large pot or tilt skillet.\n2. Add water and beef base.\n3. Cook low and slow until brisket is fully tender.\n4. Remove brisket from liquid.\n5. Reserve cooking liquid for sauce use.\n6. In a separate pot, heat oil over medium heat.\n7. Add diced onion and diced bell pepper.\n8. Cook until vegetables are softened.\n9. Add flour and stir continuously to form a roux.\n10. Add oregano, paprika, chili powder, cumin, garlic powder, and salt.\n11. Slowly add reserved brisket water, using only 1/2 of remaining liquid.\n12. Add additional 12 qt of water to reduce greasiness.\n13. Add beef base and mix thoroughly.\n14. Chop brisket to desired size and add back into sauce.\n15. Simmer gently until fully combined and desired thickness is reached.\nFINISH / HOLDING:\n• Hold hot for service.\n• If cooling, cool rapidly and refrigerate promptly.\nCRITICAL NOTES:\n• Simmer gently; do not boil hard.\n• Brisket must be fully tender before chopping.\n• Use only 1/2 of remaining brisket water to control grease.\n• Stir frequently to prevent scorching.\n• Adjust thickness with brisket water if needed.\n• Keep covered at all times.", "ES": "NOMBRE DEL PRODUCTO: Brisket Regular\nCATEGORÍA: Preparación de Entradas\nTAMAÑO DE PORCIÓN: Según necesidad\nRENDIMIENTO: 3 bandejas completas\nTIEMPO DE COCCIÓN: Lento y a fuego bajo\nTIEMPO DE MANTENIMIENTO: Mantener caliente\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES – COCCIÓN DEL BRISKET:\nBrisket de res – 40 lb\nAgua – 16 cuartos\nBase de res – 2 tazas\nINGREDIENTES – SALSA:\nCaldo del brisket reservado – usar solo 1/2 del líquido restante\nAgua adicional – 12 cuartos (para reducir grasa)\nBase de res – 1 taza\nOrégano molido – 1 taza\nPaprika – 1 taza\nHarina – 3 tazas\nChile en polvo – 1.5 tazas\nComino – 1.5 tazas\nAjo en polvo – 1/4 taza\nSal – 1/4 taza\nCebolla picada – 2 cuartos\nPimiento morrón picado – 2 cuartos\nAceite – 4 tazas\nPREPARACIÓN / PROCEDIMIENTO:\n1. Colocar el brisket en una olla grande o sartén basculante.\n2. Agregar el agua y la base de res.\n3. Cocinar lentamente a fuego bajo hasta que el brisket esté muy suave.\n4. Retirar el brisket del líquido.\n5. Reservar el caldo para la salsa.\n6. En otra olla, calentar el aceite a fuego medio.\n7. Agregar la cebolla y el pimiento morrón.\n8. Cocinar hasta que estén suaves.\n9. Agregar la harina y revolver para formar un roux.\n10. Agregar el orégano, paprika, chile en polvo, comino, ajo en polvo y sal.\n11. Agregar lentamente el caldo reservado del brisket usando solo la mitad.\n12. Agregar 12 cuartos de agua adicional para reducir la grasa.\n13. Agregar la base de res y mezclar bien.\n14. Picar el brisket y regresarlo a la salsa.\n15. Cocinar a fuego lento hasta que esté bien integrado y con la consistencia deseada.\nTERMINADO / MANTENIMIENTO:\n• Mantener caliente para el servicio.\n• Si se enfría, enfriar rápidamente y refrigerar.\nNOTAS IMPORTANTES:\n• Cocinar a fuego lento; no hervir fuerte.\n• El brisket debe estar muy suave antes de picar.\n• Usar solo la mitad del caldo restante para controlar la grasa.\n• Revolver frecuentemente para evitar que se queme.\n• Ajustar la consistencia con caldo si es necesario.\n• Mantener tapado en todo momento."}, {"name": "Salsa Chicken", "EN": "ITEM NAME: Salsa Chicken\nCATEGORY: Entrée Prep\nPORTION SIZE: As needed\nYIELD: 2 full pans\nCOOK TIME: Simmer until heated through\nHOLD TIME: Hot hold\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nPoached Chicken Thighs, shredded – 20 lbs\nDiced Poblano Peppers – 2 qt\nDiced Onions – 2 qt\nOil – 3 cups\nHuey Luey’s Salsa – 4 qt\nFuego Mix Seasoning – 1 cup\nPREPARATION / PROCEDURE:\n1. Heat oil in a large pot or rondeau over medium heat.\n2. Add diced onions and diced poblano peppers.\n3. Sauté until vegetables are softened.\n4. Add shredded poached chicken and mix well.\n5. Add Huey Luey’s salsa.\n6. Add Fuego mix seasoning.\n7. Mix thoroughly until evenly combined.\n8. Bring to a gentle simmer.\n9. Cook until fully heated through.\nFINISH / HOLDING:\n• Hold hot for service.\n• If cooling, cool rapidly and refrigerate promptly.\nCRITICAL NOTES:\n• Simmer gently; do not boil hard.\n• Stir occasionally to prevent sticking.\n• Chicken must already be fully cooked (poached).\n• Adjust seasoning if needed.\n• Keep covered at all times.", "ES": "NOMBRE DEL PRODUCTO: Pollo en Salsa\nCATEGORÍA: Preparación de Entradas\nTAMAÑO DE PORCIÓN: Según necesidad\nRENDIMIENTO: 2 bandejas completas\nTIEMPO DE COCCIÓN: Hervir a fuego lento hasta estar bien caliente\nTIEMPO DE MANTENIMIENTO: Mantener caliente\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nMuslos de pollo escalfados y deshebrados – 20 lb\nPoblano picado – 2 cuartos\nCebolla picada – 2 cuartos\nAceite – 3 tazas\nSalsa Huey Luey’s – 4 cuartos\nCondimento Fuego Mix – 1 taza\nPREPARACIÓN / PROCEDIMIENTO:\n1. Calentar el aceite en una olla grande a fuego medio.\n2. Agregar la cebolla picada y el poblano picado.\n3. Sofreír hasta que las verduras estén suaves.\n4. Agregar el pollo deshebrado y mezclar bien.\n5. Agregar la salsa Huey Luey’s.\n6. Agregar el condimento Fuego Mix.\n7. Mezclar bien hasta integrar todos los ingredientes.\n8. Llevar a fuego lento.\n9. Cocinar hasta que esté bien caliente.\nTERMINADO / MANTENIMIENTO:\n• Mantener caliente para el servicio.\n• Si se enfría, enfriar rápidamente y refrigerar.\nNOTAS IMPORTANTES:\n• Hervir suavemente; no hervir fuerte.\n• Revolver ocasionalmente para evitar que se pegue.\n• El pollo ya debe estar completamente cocido (escalfado).\n• Ajustar sazón si es necesario.\n• Mantener tapado en todo momento."}, {"name": "Poached Chicken", "EN": "ITEM NAME: Poached Chicken\nCATEGORY: Entrée Prep\nPORTION SIZE: As needed\nYIELD: 20 lbs\nCOOK TIME: Simmer until fully cooked\nHOLD TIME: Hot hold or cool properly\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nChicken Thighs – 20 lbs\nWater – 20 qt\nSalt – 2 oz\nGarlic Powder – 1 oz\nPREPARATION / PROCEDURE:\n1. Place chicken thighs into a large pot.\n2. Add water to fully submerge chicken.\n3. Add salt and garlic powder.\n4. Bring to a boil.\n5. Reduce heat to a gentle simmer.\n6. Cook until chicken is fully cooked and tender.\n7. Strain chicken from broth.\n8. Reserve strained chicken broth for soup use.\n9. Allow chicken to cool if storing.\nFINISH / HOLDING:\n• Hold chicken hot for immediate service.\n• If cooling, cool rapidly and refrigerate promptly.\n• Store reserved broth separately, covered and refrigerated.\nCRITICAL NOTES:\n• Simmer gently; do not hard boil.\n• Chicken must remain fully submerged during cooking.\n• Chicken should shred easily when fully cooked.\n• Chicken must reach full internal temperature before service.\n• Strain broth carefully to keep it clean for soup use.\n• Keep everything covered at all times.", "ES": "NOMBRE DEL PRODUCTO: Pollo Escalfado\nCATEGORÍA: Preparación de Entradas\nTAMAÑO DE PORCIÓN: Según necesidad\nRENDIMIENTO: 20 lb\nTIEMPO DE COCCIÓN: Hervir a fuego lento hasta estar bien cocido\nTIEMPO DE MANTENIMIENTO: Mantener caliente o enfriar correctamente\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nMuslos de pollo – 20 lb\nAgua – 20 cuartos\nSal – 2 onzas\nAjo en polvo – 1 onza\nPREPARACIÓN / PROCEDIMIENTO:\n1. Colocar los muslos de pollo en una olla grande.\n2. Agregar agua hasta cubrir completamente el pollo.\n3. Agregar la sal y el ajo en polvo.\n4. Llevar a hervor.\n5. Bajar el fuego y cocinar a fuego lento.\n6. Cocinar hasta que el pollo esté completamente cocido y suave.\n7. Colar el pollo y separar el caldo.\n8. Guardar el caldo colado para uso en sopas.\n9. Dejar enfriar el pollo si se va a almacenar.\nTERMINADO / MANTENIMIENTO:\n• Mantener el pollo caliente para servicio inmediato.\n• Si se enfría, enfriar rápidamente y refrigerar.\n• Guardar el caldo separado, tapado y refrigerado.\nNOTAS IMPORTANTES:\n• Hervir suavemente; no hervir fuerte.\n• El pollo debe permanecer completamente sumergido durante la cocción.\n• El pollo debe deshebrarse fácilmente cuando esté listo.\n• El pollo debe alcanzar la temperatura interna adecuada antes de servir.\n• Colar el caldo cuidadosamente para mantenerlo limpio para sopa.\n• Mantener todo tapado en todo momento."}, {"name": "Ground Beef", "EN": "ITEM NAME: Ground Beef\nCATEGORY: Entrée Prep\nPORTION SIZE: As needed\nYIELD: 18 qt\nCOOK TIME: Cook until fully done\nHOLD TIME: Hot hold\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nGround Beef – 10 lbs\nWater – splash (to prevent burning)\nDiced Tomato – 2 qt\nDiced Onion – 3 qt\nBell Pepper – 2 qt\nMixto Seasoning – 2 cups\nPREPARATION / PROCEDURE:\n1. Add ground beef to a large pot or tilt skillet.\n2. Add a small splash of water to prevent burning.\n3. Cook ground beef until fully browned.\n4. Add diced onion and bell pepper.\n5. Cook until vegetables are softened.\n6. Add diced tomato.\n7. Add mixto seasoning.\n8. Mix thoroughly until evenly combined and fully seasoned.\n9. Continue cooking until all ingredients are fully cooked.\nFINISH / HOLDING:\n• Hold hot for service.\n• If cooling, refrigerate promptly.\nCRITICAL NOTES:\n• Stir frequently to prevent sticking or scorching.\n• Ground beef must be fully cooked before service.\n• Add water only as needed to prevent burning.\n• Keep covered at all times.", "ES": "NOMBRE DEL PRODUCTO: Carne Molida\nCATEGORÍA: Preparación de Entradas\nTAMAÑO DE PORCIÓN: Según necesidad\nRENDIMIENTO: 18 cuartos\nTIEMPO DE COCCIÓN: Cocinar hasta estar completamente cocido\nTIEMPO DE MANTENIMIENTO: Mantener caliente\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nCarne molida – 10 lb\nAgua – un chorrito (para evitar que se queme)\nTomate picado – 2 cuartos\nCebolla picada – 3 cuartos\nPimiento morrón – 2 cuartos\nCondimento Mixto – 2 tazas\nPREPARACIÓN / PROCEDIMIENTO:\n1. Colocar la carne molida en una olla grande o sartén basculante.\n2. Agregar un chorrito de agua para evitar que se queme.\n3. Cocinar la carne molida hasta que esté completamente dorada.\n4. Agregar la cebolla y el pimiento morrón.\n5. Cocinar hasta que las verduras estén suaves.\n6. Agregar el tomate picado.\n7. Agregar el condimento mixto.\n8. Mezclar bien hasta que todo esté uniforme y bien sazonado.\n9. Continuar cocinando hasta que todos los ingredientes estén completamente cocidos.\nTERMINADO / MANTENIMIENTO:\n• Mantener caliente para el servicio.\n• Si se enfría, refrigerar inmediatamente.\nNOTAS IMPORTANTES:\n• Revolver frecuentemente para evitar que se pegue o se queme.\n• La carne molida debe estar completamente cocida antes de servir.\n• Agregar agua solo si es necesario para evitar que se queme.\n• Mantener tapado en todo momento."}, {"name": "Refried Beans", "EN": "INGREDIENTS:\nBasic Beans – 10 lbs\nBacon – 1 lb\nChorizo – 1 lb\nWhite Onion – 0.5 lb\nOil – 4 cups\nPico de Gallo – 5 cups\nPREPARATION / PROCEDURE:\n1. In a large pot or rondeau, cook bacon until fat is fully rendered.\n2. Add chorizo and cook until completely browned.\n3. Add white onion and cook until softened.\n4. Add oil and pico de gallo; mix well.\n5. Add basic beans.\n6. Bring to a gentle simmer.\n7. Mash beans while simmering to desired consistency.\n8. Continue cooking until beans are smooth and fully combined.\nFINISH / HOLDING:\n• Hold hot for service.\n• If cooling, refrigerate promptly.\nCRITICAL NOTES:\n• Mash beans while simmering for smooth texture.\n• Adjust consistency with bean liquid or water if needed.\n• Bacon and chorizo must be fully cooked.\n• Stir frequently to prevent scorching.\n• Keep covered at all times.", "ES": "NOMBRE DEL PRODUCTO: Frijoles Refritos\nCATEGORÍA: Preparación de Entradas\nTAMAÑO DE PORCIÓN: Según necesidad\nRENDIMIENTO: 2.5 bandejas\nTIEMPO DE COCCIÓN: Hervir a fuego lento\nTIEMPO DE MANTENIMIENTO: Mantener caliente\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nFrijoles básicos – 10 lb\nTocino – 1 lb\nChorizo – 1 lb\nCebolla blanca – 0.5 lb\nAceite – 4 tazas\nPico de gallo – 5 tazas\nPREPARACIÓN / PROCEDIMIENTO:\n1. En una olla grande, cocinar el tocino hasta que suelte toda la grasa.\n2. Agregar el chorizo y cocinar hasta que esté completamente bien cocido.\n3. Agregar la cebolla blanca y cocinar hasta que esté suave.\n4. Agregar el aceite y el pico de gallo; mezclar bien.\n5. Agregar los frijoles básicos.\n6. Llevar a fuego lento.\n7. Machacar los frijoles mientras se cocinan hasta lograr la consistencia deseada.\n8. Continuar cocinando hasta que los frijoles estén suaves y bien integrados.\nTERMINADO / MANTENIMIENTO:\n• Mantener caliente para el servicio.\n• Si se enfría, refrigerar inmediatamente.\nNOTAS IMPORTANTES:\n• Machacar los frijoles mientras se cocinan para una textura suave.\n• Ajustar la consistencia con líquido de frijol o agua si es necesario.\n• El tocino y el chorizo deben estar completamente cocidos.\n• Revolver frecuentemente para evitar que se queme el fondo.\n• Mantener tapado en todo momento."}, {"name": "Black Beans", "EN": "ITEM NAME: Black Beans\nCATEGORY: Entrée Prep\nPORTION SIZE: As needed\nYIELD: 1 full pan\nCOOK TIME: Simmer until tender\nHOLD TIME: Hot hold\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nBlack Beans – 5 cups\nSalt – 1 oz\nWater – 4.5 qt\nPREPARATION / PROCEDURE:\n1. Place black beans into a large pot.\n2. Add water to fully cover beans.\n3. Bring to a boil.\n4. Reduce heat and simmer gently.\n5. Add salt during cooking.\n6. Continue simmering until beans are fully tender.\n7. Add water as needed to maintain proper liquid level.\nFINISH / HOLDING:\n• Hold hot for service.\n• If cooling, refrigerate promptly.\nCRITICAL NOTES:\n• Simmer gently to avoid breaking beans.\n• Add salt during cooking, not before.\n• Beans must be fully cooked before service.\n• Keep covered at all times.", "ES": "NOMBRE DEL PRODUCTO: Frijoles Negros\nCATEGORÍA: Preparación de Entradas\nTAMAÑO DE PORCIÓN: Según necesidad\nRENDIMIENTO: 1 bandeja completa\nTIEMPO DE COCCIÓN: Hervir a fuego lento hasta que estén suaves\nTIEMPO DE MANTENIMIENTO: Mantener caliente\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nFrijoles negros – 5 tazas\nSal – 1 onza\nAgua – 4.5 cuartos\nPREPARACIÓN / PROCEDIMIENTO:\n1. Colocar los frijoles negros en una olla grande.\n2. Agregar agua suficiente para cubrir completamente los frijoles.\n3. Llevar a hervor.\n4. Bajar el fuego y cocinar a fuego lento.\n5. Agregar la sal durante la cocción.\n6. Continuar cocinando hasta que los frijoles estén completamente suaves.\n7. Agregar agua según sea necesario para mantener el nivel de líquido.\nTERMINADO / MANTENIMIENTO:\n• Mantener caliente para el servicio.\n• Si se enfría, refrigerar inmediatamente.\nNOTAS IMPORTANTES:\n• Hervir suavemente para evitar que los frijoles se rompan.\n• Agregar la sal durante la cocción, no antes.\n• Los frijoles deben estar completamente cocidos antes de servir.\n• Mantener tapado en todo momento."}, {"name": "Charro Beans", "EN": "ITEM NAME: Charro Beans\nCATEGORY: Entrée Prep\nPORTION SIZE: As needed\nYIELD: 4.5 gal\nCOOK TIME: Simmer\nHOLD TIME: Hot hold\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nCooked Basic Beans with Juice – 7 lbs\nChorizo – 10 lbs\nBacon – 0.5 lb\nPico de Gallo – 1 full 1/3 pan\nSalt – 7 oz\nWater – 2 qt\nPREPARATION / PROCEDURE:\n1. In a large pot, cook bacon until fat is rendered.\n2. Add chorizo to the pot.\n3. Cook chorizo until fully browned and cooked through.\n4. Add cooked basic beans with their juice.\n5. Add pico de gallo.\n6. Add water and mix thoroughly.\n7. Bring mixture to a gentle simmer.\n8. Add salt and adjust seasoning as needed.\n9. Continue simmering until flavors are fully combined.\nFINISH / HOLDING:\n• Hold hot for service.\n• If cooling, refrigerate promptly.\nCRITICAL NOTES:\n• Simmer gently to avoid breaking beans.\n• Stir occasionally to prevent sticking.\n• Chorizo must be fully cooked before service.\n• Adjust thickness with water as needed.\n• Keep covered at all times.", "ES": "NOMBRE DEL PRODUCTO: Frijoles Charros\nCATEGORÍA: Preparación de Entradas\nTAMAÑO DE PORCIÓN: Según necesidad\nRENDIMIENTO: 4.5 galones\nTIEMPO DE COCCIÓN: Hervir a fuego lento\nTIEMPO DE MANTENIMIENTO: Mantener caliente\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nFrijoles básicos cocidos con su jugo – 7 lb\nChorizo – 10 lb\nTocino – 0.5 lb\nPico de gallo – 1 bandeja completa de 1/3\nSal – 7 onzas\nAgua – 2 cuartos\nPREPARACIÓN / PROCEDIMIENTO:\n1. En una olla grande, cocinar el tocino hasta que suelte la grasa.\n2. Agregar el chorizo.\n3. Cocinar el chorizo hasta que esté completamente bien cocido.\n4. Agregar los frijoles básicos cocidos con su jugo.\n5. Agregar el pico de gallo.\n6. Agregar el agua y mezclar bien.\n7. Llevar la mezcla a fuego lento.\n8. Agregar la sal y ajustar sazón si es necesario.\n9. Cocinar a fuego lento hasta que los sabores estén bien integrados.\nTERMINADO / MANTENIMIENTO:\n• Mantener caliente para el servicio.\n• Si se enfría, refrigerar inmediatamente.\nNOTAS IMPORTANTES:\n• Hervir suavemente para no romper los frijoles.\n• Revolver ocasionalmente para evitar que se peguen.\n• El chorizo debe estar completamente cocido antes de servir.\n• Ajustar la consistencia con agua según sea necesario.\n• Mantener tapado en todo momento."}, {"name": "Pinto Beans", "EN": "", "ES": ""}], "Sauces and Spices": [{"name": "Mixto Seasoning", "EN": "ITEM NAME: Mixto Seasoning\nCATEGORY: Sauces and Spices\nPORTION SIZE: As needed\nYIELD: 29 qt\nCOOK TIME: N/A\nHOLD TIME: N/A\nSTORAGE: Covered, dry storage\nINGREDIENTS:\nBlack Pepper – 4.5 lb\nCumin – 4.5 lb\nChili Powder – 4.5 lb\nGarlic Powder – 9 lb\nGround Oregano – 1/2 bag\nSalt – 6 lb\nPREPARATION:\n1. Place all ingredients into a large, clean mixing container.\n2. Mix thoroughly until seasoning is fully blended and uniform.\n3. Break up any clumps during mixing.\n4. Transfer to labeled containers.\nNOTES:\n• Mix until color and texture are consistent throughout.\n• Store in a cool, dry area.\n• Use clean, dry scoops only.", "ES": "NOMBRE DEL PRODUCTO: Condimento Mixto\nCATEGORÍA: Salsa y Especias\nPORCIÓN: Según necesidad\nRENDIMIENTO: N/A\nTIEMPO DE PREPARACIÓN: N/A\nALMACENAMIENTO: Tapado, área seca\nINGREDIENTES:\nSal – según receta base\nPimienta negra – según receta base\nAjo en polvo – según receta base\nComino – según receta base\nChile en polvo – según receta base\nOtros condimentos según estándar Huey Luey’s\nPREPARACIÓN:\n1. Colocar todos los condimentos en un recipiente grande.\n2. Mezclar muy bien hasta que el condimento quede completamente uniforme.\n3. Verificar que no queden grumos.\nUSO:\n• Utilizar para carne molida, proteínas y guisos según receta.\n• Ajustar cantidad según volumen del producto.\nNOTAS IMPORTANTES:\n• Mantener en un recipiente tapado.\n• Guardar en un área seca y fresca.\n• Usar cuchara seca para evitar humedad."}, {"name": "Tequila Cream Sauce", "EN": "ITEM NAME: Tequila Cream Sauce\nCATEGORY: Sauces\nYIELD: 6 qt\nCOOK TIME: Low heat\nSHELF LIFE: 3 days\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nPortobello Mushrooms – 1 lb\nWhite Onion – 1 lb\nRoasted Poblanos – 1/2 lb\nRoasted Corn – 1/2 lb\nCream Cheese – 1 lb\nSour Cream – 2 cups\nHeavy Cream – 1 qt\nShredded White Cheese – 1 1/2 lb\nChicken Base – 3 tbsp\nSalt – 1/2 tbsp\nGarlic Powder – 1 tsp\nTequila Blanco – 3 tbsp\nPREPARATION / PROCEDURE:\n1. Dice portobello mushrooms and white onion evenly.\n2. In a large pot, sauté mushrooms and onions over low heat until softened.\n3. Add roasted poblanos and roasted corn; mix well.\n4. Add cream cheese and stir until fully melted.\n5. Add sour cream and heavy cream; mix until smooth.\n6. Add shredded white cheese and stir until completely melted.\n7. Add chicken base, salt, garlic powder, and tequila blanco.\n8. Mix thoroughly until sauce is smooth and fully combined.\n9. Remove from heat, cover, and refrigerate before use.\nFINISH / SERVICE:\n• Reheat gently over low heat.\n• Stir well before service.\nCRITICAL NOTES:\n• Keep heat low at all times to prevent separation.\n• Stir constantly once dair
