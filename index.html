function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function jsArg(s){return esc(JSON.stringify(String(s||'')))}
function safeKey(category,name){return String((category||'')+'-'+(name||'')).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'')||'recipe'}

function getRecipe(category,name){return recipeRows.find(r=>r.category===category && r.nameEN===name) || BUILT_IN_RECIPES.find(r=>r.category===category && r.nameEN===name)}
function formatRecipeText(text){if(!text)return `<div class="empty">${currentLang==='ES'?'No hay texto todavía.':'No recipe text yet.'}</div>`;return String(text).split('\\n').map(raw=>{const clean=raw.trim();if(!clean)return '<div class="line">&nbsp;</div>';const cls=/^[A-ZÁÉÍÓÚÜÑ0-9 &/()\-]+:$/.test(clean)||/^(ITEM NAME|NOMBRE DEL PRODUCTO|CATEGORY|CATEGORÍA|PORTION SIZE|PORCIÓN|YIELD|RENDIMIENTO|PREP TIME|TIEMPO DE PREPARACIÓN|COOK TIME|TIEMPO DE COCCIÓN|HOLD TIME|TIEMPO DE MANTENIMIENTO|STORAGE|ALMACENAMIENTO):/.test(clean)?'sectionLine':(/^•/.test(clean)?'bulletLine':(/^\d+\./.test(clean)?'numberLine':'line'));return `<div class="${cls}">${esc(raw)} </div>`}).join('')}
function handleSearch(){const q=(document.getElementById('searchInput').value||'').trim().toLowerCase(); if(q)return renderGlobalSearch(q); currentItemName?renderRecipe(currentCategory,currentItemName):(currentCategory?renderItems(currentCategory):renderCategories())}
function categories(){return [...new Set(recipeRows.map(r=>r.category).filter(Boolean))]}
function renderCategories(){currentCategory='';currentItemName='';setCrumbs(currentLang==='ES'?'Categorías':'Categories');const cats=categories();document.getElementById('view').innerHTML=`<div class="toolbar"><div class="crumbs">${esc(currentLang==='ES'?'Elige una categoría':'Choose a category')} • ${recipeRows.length} recipes</div></div><div class="grid">${cats.map(c=>`<button class="card" onclick="renderItems(${jsArg(c)})"><div><div class="cardTitle">${esc(displayCategory(c))}</div><div class="cardMeta">${recipeRows.filter(r=>r.category===c).length} recipes</div></div><div>›</div></button>`).join('')}</div>`}
function renderGlobalSearch(q){const results=recipeRows.filter(r=>[r.category,r.nameEN,r.nameES,r.textEN,r.textES].join(' ').toLowerCase().includes(q));setCrumbs(currentLang==='ES'?'Resultados':'Search Results');document.getElementById('view').innerHTML=`<div class="back" onclick="renderCategories()">← Back</div><div class="grid">${results.map(r=>`<button class="card" onclick="renderRecipe(${jsArg(r.category)},${jsArg(r.nameEN)})"><div><div class="cardTitle">${esc(currentLang==='ES'?(r.nameES||r.nameEN):r.nameEN)}</div><div class="cardMeta">${esc(displayCategory(r.category))}</div></div><div>›</div></button>`).join('')||'<div class="empty">No recipes found.</div>'}</div>`}
function renderItems(category){currentCategory=category;currentItemName='';setCrumbs(`${currentLang==='ES'?'Categorías':'Categories'} → ${displayCategory(category)}`);const items=recipeRows.filter(r=>r.category===category);document.getElementById('view').innerHTML=`<div class="back" onclick="renderCategories()">← ${esc(currentLang==='ES'?'Volver a Categorías':'Back to Categories')}</div><div class="grid">${items.map(r=>`<button class="card" onclick="renderRecipe(${jsArg(category)},${jsArg(r.nameEN)})"><div><div class="cardTitle">${esc(currentLang==='ES'?(r.nameES||r.nameEN):r.nameEN)}</div><div class="cardMeta">${esc(currentLang==='ES'?r.nameEN:(r.nameES||'Spanish name ready'))}</div></div><div>›</div></button>`).join('')}</div>`}
function renderRecipe(category,itemName){currentCategory=category;currentItemName=itemName;const r=getRecipe(category,itemName);if(!r)return renderCategories();const m=mediaByKey()[r.key]||{};const title=currentLang==='ES'?(r.nameES||r.nameEN):r.nameEN;const text=currentLang==='ES'?(r.textES||r.textEN):(r.textEN||r.textES);setCrumbs(`${currentLang==='ES'?'Categorías':'Categories'} → ${displayCategory(category)} → ${title}`);document.getElementById('view').innerHTML=`<div class="back" onclick="renderItems(${jsArg(category)})">← ${esc(currentLang==='ES'?'Volver a':'Back to')} ${esc(displayCategory(category))}</div><article class="recipe"><div class="recipeInner"><div class="recipeTop"><section class="recipeDoc"><div class="docTop"><div class="docBrand"><div class="docLogo">HL</div><div><div class="docTitle">${esc(title)}</div><div class="docSub">Huey Luey's • Corporate Recipe Manual</div></div></div><div class="docId">Recipe<br>${esc(displayCategory(category))}<br>Training Card</div></div><div class="recipeMeta"><div class="metaBox"><div class="metaLabel">Category</div><div class="metaValue">${esc(displayCategory(category))}</div></div><div class="metaBox"><div class="metaLabel">English Name</div><div class="metaValue">${esc(r.nameEN)}</div></div><div class="metaBox"><div class="metaLabel">Spanish Name</div><div class="metaValue">${esc(r.nameES||'')}</div></div></div><div class="printPhotos"><div><div class="docSectionTitle">Recipe Photo</div><div class="printPhotoBox">${m.recipePhotoUrl?`<img src="${esc(m.recipePhotoUrl)}">`:'No photo'}</div></div><div><div class="docSectionTitle">Plate Presentation</div><div class="printPhotoBox">${m.platePhotoUrl?`<img src="${esc(m.platePhotoUrl)}">`:'No photo'}</div></div></div><div class="docSectionTitle">Recipe / Procedure</div><div class="recipeText">${formatRecipeText(text)}</div><div class="platePrintNotes"><div class="docSectionTitle">Plate Presentation Notes</div><div class="recipeText">${formatRecipeText(m.plateNotes||'')}</div></div></section><aside class="sidePanel"><div><div class="docSectionTitle">Recipe Photo</div><div class="photoBox">${m.recipePhotoUrl?`<img src="${esc(m.recipePhotoUrl)}">`:'<div class="photoHint">Take / Upload Recipe Photo</div>'}</div><div class="photoActions"><label class="btn primary small" for="recipePhotoInput">Take / Upload</label><input class="fileInput" id="recipePhotoInput" type="file" accept="image/*" capture="environment" onchange="uploadImage(event,'recipe')"><button class="btn danger small" onclick="removeImage('recipe')">Remove</button></div></div><div><div class="docSectionTitle">Plate Presentation</div><div class="photoBox">${m.platePhotoUrl?`<img src="${esc(m.platePhotoUrl)}">`:'<div class="photoHint">Finished Plate Photo</div>'}</div><div class="photoActions"><label class="btn primary small" for="platePhotoInput">Take / Upload</label><input class="fileInput" id="platePhotoInput" type="file" accept="image/*" capture="environment" onchange="uploadImage(event,'plate')"><button class="btn danger small" onclick="removeImage('plate')">Remove</button></div></div><div><div class="docSectionTitle">Plate Presentation Notes</div><textarea id="plateNotesInput" class="plateNotesBox" placeholder="Sauce placement, garnish, height, plate direction...">${esc(m.plateNotes||'')}</textarea><div class="photoActions"><button class="btn primary small" onclick="savePlateNotes()">Save Notes</button></div></div><div class="statusNote">Backend saves recipes + plate notes to Google Sheets. Photos save to Google Drive. Firebase Storage is not used.</div><div class="recipeActions"><button class="btn primary" onclick="openEditor()">Edit Recipe</button><button class="btn orange" onclick="window.print()">Print / PDF</button><button class="btn" onclick="loadBackend()">Sync Now</button></div></aside></div></div></article>`}
function openEditor(){const r=getRecipe(currentCategory,currentItemName);document.getElementById('editTitle').textContent='Edit Recipe — '+r.nameEN;document.getElementById('editNameEN').value=r.nameEN||'';document.getElementById('editNameES').value=r.nameES||'';document.getElementById('editEN').value=r.textEN||'';document.getElementById('editES').value=r.textES||'';document.getElementById('editModal').classList.add('open')}function closeEditor(){document.getElementById('editModal').classList.remove('open')}
async function api(action,payload={}){const res=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action,...payload})});const txt=await res.text();try{return JSON.parse(txt)}catch(e){throw new Error(txt||'Bad backend response')}}
async function loadBackend(){setSync('Syncing','');try{const out=await api('getAll'); if(out.recipes&&out.recipes.length)recipeRows=out.recipes.map(r=>({...r,active:String(r.active).toUpperCase()==='FALSE'?'FALSE':'TRUE'})).filter(r=>r.active!=='FALSE'); if(out.media)mediaRows=out.media; setSync('Synced','online'); if(currentItemName)renderRecipe(currentCategory,currentItemName); else if(currentCategory)renderItems(currentCategory); else renderCategories();}catch(e){console.error(e);setSync('Local Fallback','error');renderCategories()}}
async function seedSheet(){if(!confirm('Seed Google Sheet with the built-in recipe rows? This will update the backend Recipes tab.'))return;setSync('Seeding','');try{await api('seedRecipes',{recipes:BUILT_IN_RECIPES});await loadBackend();alert('Sheet seeded.')}catch(e){console.error(e);setSync('Seed Error','error');alert('Seed failed. Check Apps Script SHEET_ID and deployment access.')}}
async function saveRecipeEdits(){const r=getRecipe(currentCategory,currentItemName);const updated={...r,nameEN:document.getElementById('editNameEN').value.trim()||r.nameEN,nameES:document.getElementById('editNameES').value.trim(),textEN:document.getElementById('editEN').value,textES:document.getElementById('editES').value};setSync('Saving','');try{await api('saveRecipe',{recipe:updated});closeEditor();await loadBackend();}catch(e){console.error(e);setSync('Save Error','error');alert('Save failed.')}}
async function savePlateNotes(){const r=getRecipe(currentCategory,currentItemName);setSync('Saving Notes','');try{await api('savePlateNotes',{key:r.key,category:r.category,itemName:r.nameEN,plateNotes:document.getElementById('plateNotesInput').value||''});await loadBackend();}catch(e){console.error(e);setSync('Notes Error','error')}}
async function uploadImage(e,type){const file=e.target.files&&e.target.files[0];if(!file)return;const r=getRecipe(currentCategory,currentItemName);setSync('Processing Photo','');try{const dataUrl=await resizeImageFile(file,1200,.76);await api('uploadImage',{key:r.key,category:r.category,itemName:r.nameEN,type,dataUrl});await loadBackend();}catch(err){console.error(err);setSync('Photo Error','error');alert('Photo failed. Try a smaller image.')}}
async function removeImage(type){const r=getRecipe(currentCategory,currentItemName);setSync('Removing','');try{await api('removeImage',{key:r.key,category:r.category,itemName:r.nameEN,type});await loadBackend();}catch(e){console.error(e);setSync('Remove Error','error')}}
function resizeImageFile(file,max=1200,quality=.76){return new Promise((resolve,reject)=>{const img=new Image();const url=URL.createObjectURL(file);img.onload=()=>{const scale=Math.min(1,max/Math.max(img.width,img.height));const canvas=document.createElement('canvas');canvas.width=Math.max(1,Math.round(img.width*scale));canvas.height=Math.max(1,Math.round(img.height*scale));canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);URL.revokeObjectURL(url);resolve(canvas.toDataURL('image/jpeg',quality))};img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('Invalid image'))};img.src=url})}
window.addEventListener('DOMContentLoaded',loadBackend);
</script></body></html>
