y is added.\n• Keep refrigerated when not in use.\n• Discard after 3 days.", "ES": "NOMBRE DEL PRODUCTO: Salsa Cremosa de Tequila\nCATEGORÍA: Salsas\nRENDIMIENTO: 6 qt\nTIEMPO DE COCCIÓN: Fuego bajo\nVIDA ÚTIL: 3 días\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nHongos portobello – 1 lb\nCebolla blanca – 1 lb\nPoblanos asados – 1/2 lb\nMaíz asado – 1/2 lb\nQueso crema – 1 lb\nCrema agria – 2 tazas\nCrema espesa – 1 qt\nQueso blanco rallado – 1 1/2 lb\nBase de pollo – 3 cucharadas\nSal – 1/2 cucharada\nAjo en polvo – 1 cucharadita\nTequila blanco – 3 cucharadas\nPREPARACIÓN / PROCEDIMIENTO:\n1. Picar los hongos portobello y la cebolla blanca en trozos parejos.\n2. En una olla grande, saltear los hongos y la cebolla a fuego bajo hasta que estén suaves.\n3. Agregar los poblanos asados y el maíz asado; mezclar bien.\n4. Agregar el queso crema y revolver hasta que se derrita completamente.\n5. Agregar la crema agria y la crema espesa; mezclar hasta que quede suave.\n6. Agregar el queso blanco rallado y revolver hasta que se derrita.\n7. Agregar la base de pollo, la sal, el ajo en polvo y el tequila blanco.\n8. Mezclar bien hasta que la salsa esté completamente integrada y suave.\n9. Retirar del fuego, tapar y refrigerar antes de usar.\nTERMINADO / SERVICIO:\n• Recalentar suavemente a fuego bajo.\n• Revolver bien antes de servir.\nNOTAS IMPORTANTES:\n• Mantener el fuego bajo para evitar que la salsa se corte.\n• Revolver constantemente después de agregar los lácteos.\n• Mantener refrigerado cuando no esté en uso.\n• Desechar después de 3 días."}, {"name": "Mild Salsa", "EN": "ITEM NAME: Mild Salsa\nCATEGORY: Sauces\nYIELD: 1 gal\nCOOK TIME: N/A\nSHELF LIFE: 3 days\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nFresh Tomatoes – 5 lb\nChopped White Onion – 1/2 lb\nWhole Tomatoes (pouch) – 1 pouch\nGarlic Powder – 1 tbsp\nSalt – 2 tbsp\nChopped Cilantro – 1 cup\nPREPARATION / PROCEDURE:\n1. Chop fresh tomatoes and place into a mixing container.\n2. Add chopped white onion.\n3. Add whole tomatoes from pouch.\n4. Add garlic powder, salt, and chopped cilantro.\n5. Mix gently until evenly combined.\n6. Cover and refrigerate before use.\nFINISH / SERVICE:\n• Stir well before service.\n• Serve chilled.\nCRITICAL NOTES:\n• Do not over-mix to maintain texture.\n• Keep refrigerated at all times.\n• Discard after 3 days.", "ES": "NOMBRE DEL PRODUCTO: Salsa Suave\nCATEGORÍA: Salsas\nRENDIMIENTO: 1 galón\nTIEMPO DE COCCIÓN: N/A\nVIDA ÚTIL: 3 días\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nTomate fresco – 5 lb\nCebolla blanca picada – 1/2 lb\nTomate entero (bolsa) – 1 bolsa\nAjo en polvo – 1 cucharada\nSal – 2 cucharadas\nCilantro picado – 1 taza\nPREPARACIÓN / PROCEDIMIENTO:\n1. Picar el tomate fresco y colocarlo en un recipiente.\n2. Agregar la cebolla blanca picada.\n3. Agregar el tomate entero de la bolsa.\n4. Agregar el ajo en polvo, la sal y el cilantro picado.\n5. Mezclar suavemente hasta integrar bien.\n6. Tapar y refrigerar antes de usar.\nTERMINADO / SERVICIO:\n• Revolver bien antes de servir.\n• Servir frío.\nNOTAS IMPORTANTES:\n• No sobre mezclar para mantener la textura.\n• Mantener refrigerado en todo momento.\n• Desechar después de 3 días."}, {"name": "Korean BBQ Marinade", "EN": "ITEM NAME: Korean BBQ Marinade\nCATEGORY: Sauces\nYIELD: 4 qt\nCOOK TIME: N/A\nSHELF LIFE: 5 days\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nJulienned Onion – 1 ea\nGarlic Cloves, peeled – 32 ea\nChipotle in Adobo – 1 can\nPears – 3 ea (peeled, stem removed)\nBlack Pepper – 1 tbsp\nSoy Sauce – 2 cups\nVegetable Oil – 1 cup\nSugar – 3/4 cup\nPREPARATION / PROCEDURE:\n1. Place julienned onion, garlic cloves, chipotle in adobo, and pears into a blender.\n2. Add black pepper, soy sauce, vegetable oil, and sugar.\n3. Blend until completely smooth.\n4. Transfer marinade into labeled containers.\n5. Refrigerate before use.\nFINISH / SERVICE:\n• Stir or shake before use if separation occurs.\n• Use as marinade for proteins as directed.\nCRITICAL NOTES:\n• Blend until fully smooth for even coating.\n• Keep refrigerated at all times.\n• Discard after 5 days.", "ES": "NOMBRE DEL PRODUCTO: Marinado BBQ Coreano\nCATEGORÍA: Salsas\nRENDIMIENTO: 4 qt\nTIEMPO DE COCCIÓN: N/A\nVIDA ÚTIL: 5 días\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nCebolla en juliana – 1 unidad\nDientes de ajo pelados – 32 unidades\nChipotle en adobo – 1 lata\nPeras – 3 unidades (peladas y sin tallo)\nPimienta negra – 1 cucharada\nSalsa de soya – 2 tazas\nAceite vegetal – 1 taza\nAzúcar – 3/4 taza\nPREPARACIÓN / PROCEDIMIENTO:\n1. Colocar la cebolla en juliana, los dientes de ajo, el chipotle en adobo y las peras en una licuadora.\n2. Agregar la pimienta negra, la salsa de soya, el aceite vegetal y el azúcar.\n3. Licuar hasta obtener una textura completamente suave.\n4. Transferir el marinado a recipientes etiquetados.\n5. Refrigerar antes de usar.\nTERMINADO / SERVICIO:\n• Revolver o agitar antes de usar si se separa.\n• Usar como marinado para proteínas según la receta.\nNOTAS IMPORTANTES:\n• Licuar completamente para lograr una cobertura uniforme.\n• Mantener refrigerado en todo momento.\n• Desechar después de 5 días."}, {"name": "Habenero Salsa", "EN": "", "ES": ""}, {"name": "Salsa Verde", "EN": "ITEM NAME: Salsa Verde\nCATEGORY: Sauces\nYIELD: 6 qt\nCOOK TIME: N/A\nSHELF LIFE: 3 days\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nTomatillos – 10 lb (boiled)\nWhite Onion – 1 lb\nFresh Jalapeño – 2 ea\nGarlic Purée – 1 tbsp\nSalt – 2 tbsp\nOil – 1/4 cup\nWater – 1 qt\nPREPARATION / PROCEDURE:\n1. Boil tomatillos until fully cooked and soft.\n2. Drain tomatillos and place into a blender or large mixing container.\n3. Add white onion, fresh jalapeños, garlic purée, and salt.\n4. Blend until completely smooth.\n5. Slowly add oil while blending.\n6. Add water as needed to reach desired consistency.\n7. Cover and refrigerate before use.\nFINISH / SERVICE:\n• Stir well before service.\n• Serve chilled.\nCRITICAL NOTES:\n• Blend until completely smooth.\n• Adjust water to control consistency.\n• Keep refrigerated at all times.\n• Discard after 3 days.", "ES": "NOMBRE DEL PRODUCTO: Salsa Verde\nCATEGORÍA: Salsas\nRENDIMIENTO: 6 qt\nTIEMPO DE COCCIÓN: N/A\nVIDA ÚTIL: 3 días\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nTomatillos – 10 lb (hervidos)\nCebolla blanca – 1 lb\nJalapeño fresco – 2 unidades\nPuré de ajo – 1 cucharada\nSal – 2 cucharadas\nAceite – 1/4 taza\nAgua – 1 qt\nPREPARACIÓN / PROCEDIMIENTO:\n1. Hervir los tomatillos hasta que estén completamente cocidos y suaves.\n2. Escurrir los tomatillos y colocarlos en una licuadora o recipiente grande.\n3. Agregar la cebolla blanca, los jalapeños frescos, el puré de ajo y la sal.\n4. Licuar hasta obtener una textura completamente suave.\n5. Agregar el aceite lentamente mientras se licúa.\n6. Agregar agua según sea necesario para lograr la consistencia deseada.\n7. Tapar y refrigerar antes de usar.\nTERMINADO / SERVICIO:\n• Revolver bien antes de servir.\n• Servir frío.\nNOTAS IMPORTANTES:\n• Licuar hasta que quede completamente suave.\n• Ajustar el agua para controlar la consistencia.\n• Mantener refrigerado en todo momento.\n• Desechar después de 3 días."}, {"name": "Steak Marinade", "EN": "ITEM NAME: Steak Marinade\nCATEGORY: Sauces\nYIELD: 19 qt\nCOOK TIME: N/A\nSHELF LIFE: 5 days\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nGuajillo Chiles – 100 ea\nCilantro Bunches – 4 ea\nCumin – 1 cup\nBlack Pepper – 1 cup\nDry Oregano – 1 cup\nLawry’s Seasoning – 4.5 cups\nGarlic Cloves – 3 lb\nFresh Orange Juice – 2.5 qt\nTropicana Orange Juice – 1 qt\nVegetable Oil – 3 qt\nWhite Vinegar – 2.5 qt\nPineapple Juice – 2.5 qt\nPREPARATION / PROCEDURE:\n1. Remove stems from guajillo chiles.\n2. Place guajillo chiles, garlic cloves, and cilantro into a blender or large container.\n3. Add cumin, black pepper, dry oregano, and Lawry’s seasoning.\n4. Add fresh orange juice, Tropicana orange juice, pineapple juice, and white vinegar.\n5. Blend until completely smooth.\n6. Slowly add vegetable oil while blending until fully incorporated.\n7. Transfer marinade to labeled containers.\n8. Refrigerate before use.\nFINISH / SERVICE:\n• Stir or shake before use if separated.\n• Use as steak marinade according to recipe.\nCRITICAL NOTES:\n• Blend until completely smooth.\n• Keep refrigerated at all times.\n• Discard after 5 days.", "ES": "NOMBRE DEL PRODUCTO: Marinado para Carne\nCATEGORÍA: Salsas\nRENDIMIENTO: 19 qt\nTIEMPO DE COCCIÓN: N/A\nVIDA ÚTIL: 5 días\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nChiles guajillo – 100 unidades\nCilantro en manojo – 4 unidades\nComino – 1 taza\nPimienta negra – 1 taza\nOrégano seco – 1 taza\nCondimento Lawry’s – 4.5 tazas\nDientes de ajo – 3 lb\nJugo de naranja natural – 2.5 qt\nJugo de naranja Tropicana – 1 qt\nAceite vegetal – 3 qt\nVinagre blanco – 2.5 qt\nJugo de piña – 2.5 qt\nPREPARACIÓN / PROCEDIMIENTO:\n1. Retirar los tallos de los chiles guajillo.\n2. Colocar los chiles guajillo, los dientes de ajo y el cilantro en una licuadora o recipiente grande.\n3. Agregar el comino, la pimienta negra, el orégano seco y el condimento Lawry’s.\n4. Agregar el jugo de naranja natural, el jugo de naranja Tropicana, el jugo de piña y el vinagre blanco.\n5. Licuar hasta que quede completamente suave.\n6. Agregar el aceite vegetal lentamente mientras se licúa hasta integrar bien.\n7. Transferir el marinado a recipientes etiquetados.\n8. Refrigerar antes de usar.\nTERMINADO / SERVICIO:\n• Revolver o agitar antes de usar si se separa.\n• Usar como marinado para carne según la receta.\nNOTAS IMPORTANTES:\n• Licuar hasta obtener una textura completamente suave.\n• Mantener refrigerado en todo momento.\n• Desechar después de 5 días."}, {"name": "Honey Chipotle Glaze", "EN": "ITEM NAME: Honey Chipotle Glaze\nCATEGORY: Sauces\nYIELD: 4 qt\nCOOK TIME: N/A\nSHELF LIFE: 5 days\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nSugar – 16 oz\nHoney – 10 oz\nChipotle in Adobo – 1 can\nCumin – 2 tbsp\nLime Juice – 1/4 cup\nSoy Sauce – 1/4 cup\nPREPARATION / PROCEDURE:\n1. Place sugar and honey into a mixing container or pot.\n2. Add chipotle in adobo.\n3. Add cumin, lime juice, and soy sauce.\n4. Mix thoroughly until fully combined and smooth.\n5. Cover and refrigerate until ready for use.\nFINISH / SERVICE:\n• Stir well before service.\n• Use as glaze or finishing sauce as needed.\nCRITICAL NOTES:\n• Mix very well to fully break down the chipotle.\n• Keep refrigerated at all times.\n• Discard after 5 days.", "ES": "NOMBRE DEL PRODUCTO: Glaseado de Miel y Chipotle\nCATEGORÍA: Salsas\nRENDIMIENTO: 4 qt\nTIEMPO DE COCCIÓN: N/A\nVIDA ÚTIL: 5 días\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nAzúcar – 16 oz\nMiel – 10 oz\nChipotle en adobo – 1 lata\nComino – 2 cucharadas\nJugo de limón – 1/4 taza\nSalsa de soya – 1/4 taza\nPREPARACIÓN / PROCEDIMIENTO:\n1. Colocar el azúcar y la miel en un recipiente u olla.\n2. Agregar el chipotle en adobo.\n3. Agregar el comino, el jugo de limón y la salsa de soya.\n4. Mezclar muy bien hasta que quede completamente integrado y suave.\n5. Tapar y refrigerar hasta su uso.\nTERMINADO / SERVICIO:\n• Revolver bien antes de servir.\n• Usar como glaseado o salsa final según sea necesario.\nNOTAS IMPORTANTES:\n• Mezclar muy bien para deshacer completamente el chipotle.\n• Mantener refrigerado en todo momento.\n• Desechar después de 5 días."}, {"name": "Huey Luey's Salsa", "EN": "", "ES": ""}, {"name": "Fried Breading", "EN": "ITEM NAME: Fried Breading\nCATEGORY: Sauces\nYIELD: As needed\nCOOK TIME: N/A\nSHELF LIFE: Same day\nSTORAGE: Covered, dry storage\nINGREDIENTS:\nPanko – 1 cup\nHuey Luey’s Seasoning – 2 tbsp\nPREPARATION / PROCEDURE:\n1. Place panko and Huey Luey’s seasoning into a mixing container.\n2. Mix thoroughly until evenly combined.\n3. Use as needed for breading.\nFINISH / SERVICE:\n• Ready to use once mixed.\n• Use immediately as needed.\nCRITICAL NOTES:\n• Mix well for even seasoning.\n• Keep completely dry at all times.\n• Discard if contaminated with moisture.\n• Use same day for best quality.", "ES": "NOMBRE DEL PRODUCTO: Empanizado para Freír\nCATEGORÍA: Salsas\nRENDIMIENTO: Según necesidad\nTIEMPO DE COCCIÓN: N/A\nVIDA ÚTIL: Mismo día\nALMACENAMIENTO: Tapado, almacenamiento seco\nINGREDIENTES:\nPanko – 1 taza\nCondimento Huey Luey’s – 2 cucharadas\nPREPARACIÓN / PROCEDIMIENTO:\n1. Colocar el panko y el condimento Huey Luey’s en un recipiente.\n2. Mezclar muy bien hasta que quede uniforme.\n3. Usar según sea necesario para empanizar.\nTERMINADO / SERVICIO:\n• Listo para usar una vez mezclado.\n• Usar inmediatamente según necesidad.\nNOTAS IMPORTANTES:\n• Mezclar bien para que el condimento quede parejo.\n• Mantener completamente seco en todo momento.\n• Desechar si entra en contacto con humedad.\n• Usar el mismo día para mejor calidad."}, {"name": "Fuego Mix Seasoning", "EN": "ITEM NAME: Fuego Mix Seasoning\nCATEGORY: Sauces\nYIELD: 3.5 qt\nCOOK TIME: N/A\nSHELF LIFE: 30 days\nSTORAGE: Covered, dry storage\nINGREDIENTS:\nPaprika – 4 cups\nCayenne Pepper – 1/4 cup\nSalt – 2 cups\nBlack Pepper – 2 cups\nGarlic Powder – 2 cups\nChili Powder – 2 cups\nDried Oregano – 2 cups\nPREPARATION / PROCEDURE:\n1. Place all ingredients into a large mixing container.\n2. Mix thoroughly until evenly combined.\n3. Break up any clumps during mixing.\n4. Transfer seasoning into labeled, dry containers.\nFINISH / SERVICE:\n• Ready to use once fully mixed.\n• Use as directed in recipes.\nCRITICAL NOTES:\n• Mix extremely well for consistent heat and flavor.\n• Keep completely dry at all times.\n• Do not introduce moisture.\n• Store in dry storage only.", "ES": "NOMBRE DEL PRODUCTO: Condimento Fuego\nCATEGORÍA: Salsas\nRENDIMIENTO: 3.5 qt\nTIEMPO DE COCCIÓN: N/A\nVIDA ÚTIL: 30 días\nALMACENAMIENTO: Tapado, almacenamiento seco\nINGREDIENTES:\nPaprika – 4 tazas\nPimienta cayena – 1/4 taza\nSal – 2 tazas\nPimienta negra – 2 tazas\nAjo en polvo – 2 tazas\nChile en polvo – 2 tazas\nOrégano seco – 2 tazas\nPREPARACIÓN / PROCEDIMIENTO:\n1. Colocar todos los ingredientes en un recipiente grande.\n2. Mezclar muy bien hasta que quede completamente integrado.\n3. Deshacer cualquier grumo durante la mezcla.\n4. Transferir el condimento a recipientes secos y etiquetados.\nTERMINADO / SERVICIO:\n• Listo para usar una vez mezclado.\n• Usar según lo indique la receta.\nNOTAS IMPORTANTES:\n• Mezclar extremadamente bien para lograr picante y sabor uniforme.\n• Mantener completamente seco en todo momento.\n• No introducir humedad.\n• Almacenar únicamente en área seca."}, {"name": "Tex Mex Seasoning", "EN": "", "ES": ""}, {"name": "Chicken Brine", "EN": "ITEM NAME: Chicken Brine\nCATEGORY: Proteins\nYIELD: 22 qt\nCOOK TIME: N/A\nSHELF LIFE: 24 hours\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nWater – 5 gal\nSalt – 2 cups\nFuego Spice Mix – 2 cups\nDried Oregano – 2 cups\nDiced White Onions – 5 ea\nCilantro Bunches – 5 ea\nGarlic Cloves – 2 cups\nFresh Jalapeños – 5 ea\nLime Juice – 1 qt\nPREPARATION / PROCEDURE:\n1. In a large container, add the water.\n2. Add salt and stir until fully dissolved.\n3. Add Fuego spice mix and dried oregano; mix well.\n4. Add diced white onions, cilantro bunches, garlic cloves, and fresh jalapeños.\n5. Add lime juice.\n6. Mix thoroughly until all ingredients are evenly combined.\n7. Submerge chicken completely in the brine.\n8. Cover and refrigerate.\nFINISH / SERVICE:\n• Remove chicken from brine before cooking.\n• Discard brine after use.\nCRITICAL NOTES:\n• Chicken must be fully submerged at all times.\n• Use within 24 hours only.\n• Keep refrigerated at all times.", "ES": "NOMBRE DEL PRODUCTO: Salmuera para Pollo\nCATEGORÍA: Proteínas\nRENDIMIENTO: 22 qt\nTIEMPO DE COCCIÓN: N/A\nVIDA ÚTIL: 24 horas\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nAgua – 5 galones\nSal – 2 tazas\nMezcla de especias Fuego – 2 tazas\nOrégano seco – 2 tazas\nCebolla blanca picada – 5 unidades\nCilantro en manojo – 5 unidades\nDientes de ajo – 2 tazas\nJalapeños frescos – 5 unidades\nJugo de limón – 1 qt\nPREPARACIÓN / PROCEDIMIENTO:\n1. En un recipiente grande, agregar el agua.\n2. Agregar la sal y revolver hasta que se disuelva completamente.\n3. Agregar la mezcla de especias Fuego y el orégano seco; mezclar bien.\n4. Agregar la cebolla blanca, el cilantro, los dientes de ajo y los jalapeños frescos.\n5. Agregar el jugo de limón.\n6. Mezclar bien hasta que todos los ingredientes estén bien integrados.\n7. Sumergir completamente el pollo en la salmuera.\n8. Tapar y refrigerar.\nTERMINADO / SERVICIO:\n• Retirar el pollo de la salmuera antes de cocinar.\n• Desechar la salmuera después de usar.\nNOTAS IMPORTANTES:\n• El pollo debe permanecer completamente sumergido.\n• Usar únicamente dentro de 24 horas.\n• Mantener refrigerado en todo momento."}, {"name": "Foamy Garlic Butter", "EN": "ITEM NAME: Foamy Garlic Butter\nCATEGORY: Sauces\nYIELD: 28 qt\nCOOK TIME: Low heat\nSHELF LIFE: 3 days\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nButter – 8 lb\nMargarine – 8 lb\nKnorr Chicken Powder – 1 cup\nGarlic Purée – 1 cup\nWhite Wine (Chardonnay) – 2 bottles\nPREPARATION / PROCEDURE:\n1. Melt butter and margarine together in a large pot over low heat.\n2. Add Knorr chicken powder and garlic purée.\n3. Stir until fully incorporated and smooth.\n4. Slowly add white wine while stirring continuously.\n5. Continue stirring until butter becomes smooth and foamy.\n6. Remove from heat and allow to cool slightly before storing.\nFINISH / SERVICE:\n• Stir well before service.\n• Use warm or reheat gently as needed.\nCRITICAL NOTES:\n• Add wine slowly to prevent separation.\n• Keep heat low at all times.\n• Stir continuously to maintain smooth, foamy texture.\n• Discard after 3 days.", "ES": "NOMBRE DEL PRODUCTO: Mantequilla de Ajo Espumosa\nCATEGORÍA: Salsas\nRENDIMIENTO: 28 qt\nTIEMPO DE COCCIÓN: Fuego bajo\nVIDA ÚTIL: 3 días\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nMantequilla – 8 lb\nMargarina – 8 lb\nPolvo de pollo Knorr – 1 taza\nPuré de ajo – 1 taza\nVino blanco (Chardonnay) – 2 botellas\nPREPARACIÓN / PROCEDIMIENTO:\n1. Derretir la mantequilla y la margarina juntas en una olla grande a fuego bajo.\n2. Agregar el polvo de pollo Knorr y el puré de ajo.\n3. Revolver hasta que esté bien integrado y suave.\n4. Agregar el vino blanco lentamente mientras se revuelve constantemente.\n5. Continuar mezclando hasta que la mantequilla quede suave y espumosa.\n6. Retirar del fuego y dejar enfriar ligeramente antes de almacenar.\nTERMINADO / SERVICIO:\n• Revolver bien antes de servir.\n• Usar caliente o recalentar suavemente según sea necesario.\nNOTAS IMPORTANTES:\n• Agregar el vino poco a poco para evitar que se corte.\n• Mantener el fuego bajo en todo momento.\n• Revolver constantemente para lograr una textura suave y espumosa.\n• Desechar después de 3 días."}, {"name": "Ranchero Sauce", "EN": "ITEM NAME: Ranchero Sauce\nCATEGORY: Sauces\nYIELD: 40 qt\nCOOK TIME: Simmer until thick\nSHELF LIFE: 3 days\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nTomato Punches – 4 pouches\nWhole Tomatoes, cooked – 20 lb\nDiced Poblano Peppers – 2 qt\nDiced White Onions – 2 qt\nTex-Mex Spice – 3 cups\nFlour – 3 cups\nOil – 4 cups\nWater – 12 qt\nPREPARATION / PROCEDURE:\n1. Heat oil in a large pot over medium heat.\n2. Add flour and stir continuously to form a roux.\n3. Cook roux until lightly toasted.\n4. Add diced white onions and diced poblano peppers; mix well.\n5. Add tomato punches and cooked whole tomatoes.\n6. Add Tex-Mex spice and mix thoroughly.\n7. Slowly add water while stirring constantly to prevent lumps.\n8. Simmer until sauce thickens and flavors are fully combined.\n9. Stir occasionally during cooking.\nFINISH / SERVICE:\n• Hold hot for service or cool properly for storage.\n• Stir well before service.\nCRITICAL NOTES:\n• Stir constantly when adding flour and liquid to avoid clumping.\n• Adjust thickness with water as needed.\n• Keep refrigerated when not in use.\n• Discard after 3 days.", "ES": "NOMBRE DEL PRODUCTO: Salsa Ranchera\nCATEGORÍA: Salsas\nRENDIMIENTO: 40 qt\nTIEMPO DE COCCIÓN: Hervir a fuego lento hasta espesar\nVIDA ÚTIL: 3 días\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nPuré de tomate en bolsa – 4 bolsas\nTomates enteros cocidos – 20 lb\nChile poblano picado – 2 qt\nCebolla blanca picada – 2 qt\nEspecias Tex-Mex – 3 tazas\nHarina – 3 tazas\nAceite – 4 tazas\nAgua – 12 qt\nPREPARACIÓN / PROCEDIMIENTO:\n1. Calentar el aceite en una olla grande a fuego medio.\n2. Agregar la harina y revolver constantemente para formar un roux.\n3. Cocinar el roux hasta que esté ligeramente dorado.\n4. Agregar la cebolla blanca y el chile poblano; mezclar bien.\n5. Agregar el puré de tomate y los tomates enteros cocidos.\n6. Agregar las especias Tex-Mex y mezclar bien.\n7. Agregar el agua poco a poco mientras se revuelve constantemente para evitar grumos.\n8. Hervir a fuego lento hasta que la salsa espese y los sabores se integren.\n9. Revolver ocasionalmente durante la cocción.\nTERMINADO / SERVICIO:\n• Mantener caliente para el servicio o enfriar correctamente para almacenar.\n• Revolver bien antes de servir.\nNOTAS IMPORTANTES:\n• Revolver constantemente al agregar la harina y el líquido para evitar grumos.\n• Ajustar la consistencia con agua según sea necesario.\n• Mantener refrigerado cuando no esté en uso.\n• Desechar después de 3 días."}, {"name": "Chilli Gravy", "EN": "", "ES": ""}, {"name": "Poblano Fry Batter", "EN": "ITEM NAME: Poblano Fry Batter\nCATEGORY: Sauces\nYIELD: 16 poblanos\nCOOK TIME: N/A\nSHELF LIFE: Same day\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nWhole Eggs – 15 ea\nEgg Yolks – 2 ea\nFlour – 0.25 cup\nPREPARATION / PROCEDURE:\n1. Separate 2 egg yolks and set aside.\n2. Combine whole eggs and egg yolks in a mixing bowl.\n3. Add flour.\n4. Whisk until smooth and fully incorporated.\n5. Use immediately for battering poblanos.\nFINISH / SERVICE:\n• Batter is ready once smooth.\n• Use immediately for frying.\nCRITICAL NOTES:\n• Batter should be smooth with no lumps.\n• Do not over-mix.\n• Use same day for best performance.", "ES": "NOMBRE DEL PRODUCTO: Batido para Poblanos\nCATEGORÍA: Salsas\nRENDIMIENTO: 16 poblanos\nTIEMPO DE COCCIÓN: N/A\nVIDA ÚTIL: Mismo día\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nHuevos enteros – 15 unidades\nYemas de huevo – 2 unidades\nHarina – 0.25 taza\nPREPARACIÓN / PROCEDIMIENTO:\n1. Separar 2 yemas de huevo y reservar.\n2. Colocar los huevos enteros y las yemas en un recipiente.\n3. Agregar la harina.\n4. Batir hasta obtener una mezcla suave y bien integrada.\n5. Usar inmediatamente para empanizar los poblanos.\nTERMINADO / SERVICIO:\n• El batido está listo cuando queda suave.\n• Usar inmediatamente para freír.\nNOTAS IMPORTANTES:\n• El batido debe quedar suave, sin grumos.\n• No sobre batir.\n• Usar el mismo día para mejor resultado."}, {"name": "Spicy Cheese Dip", "EN": "ITEM NAME: Spicy Cheese Dip\nCATEGORY: Sauces\nYIELD: Base recipe (increase as needed)\nCOOK TIME: N/A\nSHELF LIFE: Same day\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nShredded White Cheese – 1 box (30 lb)\nWhole Milk – 2 gallons\nWhole Oregano – 1 tbsp\nChicken Base – 6 tbsp\nPickled Jalapeños – 1 can (no juice)\nPREPARATION / PROCEDURE:\n1. This recipe is the base starting point; increase quantities as needed for larger batches.\n2. Place shredded white cheese into a large pot or steam table insert.\n3. Slowly add whole milk while stirring continuously.\n4. Add whole oregano and chicken base.\n5. Add pickled jalapeños (do not include juice).\n6. Heat gently while stirring until cheese is fully melted and smooth.\n7. Adjust milk as needed to reach desired consistency.\nFINISH / SERVICE:\n• Hold warm for service.\n• Stir before serving to maintain smooth texture.\nCRITICAL NOTES:\n• Stir constantly to prevent scorching.\n• Do not overheat.\n• Thin with milk only.\n• Do not add jalapeño juice.\n• Use same day for best quality.", "ES": "NOMBRE DEL PRODUCTO: Queso Picante\nCATEGORÍA: Salsas\nRENDIMIENTO: Receta base (aumentar según necesidad)\nTIEMPO DE COCCIÓN: N/A\nVIDA ÚTIL: Mismo día\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nQueso blanco rallado – 1 caja (30 lb)\nLeche entera – 2 galones\nOrégano entero – 1 cucharada\nBase de pollo – 6 cucharadas\nJalapeños encurtidos – 1 lata (sin jugo)\nPREPARACIÓN / PROCEDIMIENTO:\n1. Esta receta es la base inicial; aumentar cantidades según sea necesario.\n2. Colocar el queso blanco rallado en una olla grande o inserto de vapor.\n3. Agregar la leche entera poco a poco mientras se revuelve constantemente.\n4. Agregar el orégano entero y la base de pollo.\n5. Agregar los jalapeños encurtidos (no agregar el jugo).\n6. Calentar suavemente mientras se revuelve hasta que el queso esté completamente derretido y suave.\n7. Ajustar la leche según sea necesario para lograr la consistencia deseada.\nTERMINADO / SERVICIO:\n• Mantener caliente para el servicio.\n• Revolver antes de servir para mantener la textura suave.\nNOTAS IMPORTANTES:\n• Revolver constantemente para evitar que se queme.\n• No sobrecalentar.\n• Solo diluir con leche.\n• No agregar el jugo de los jalapeños.\n• Usar el mismo día para mejor calidad."}, {"name": "Cheese Dip", "EN": "", "ES": ""}], "Dressings": [{"name": "Avocado Roll Dip", "EN": "ITEM NAME: Avocado Dip Sauce\nCATEGORY: Dressings\nYIELD: 1.5 qt\nCOOK TIME: N/A\nSHELF LIFE: 3 days\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nSour Cream – 1.5 cups\nMayonnaise – 1/2 cup\nGarlic Purée – 5 tbsp\nKosher Salt – 2 tsp\nBlack Pepper – 1 tsp\nChopped Cilantro – 1 cup\nFresh Squeezed Lime Juice – 1/4 cup\nFresh Jalapeño, diced – 3 ea\nPREPARATION / PROCEDURE:\n1. Place sour cream and mayonnaise into a mixing container.\n2. Add garlic purée, kosher salt, and black pepper.\n3. Add chopped cilantro, lime juice, and diced jalapeño.\n4. Mix or blend until smooth and evenly combined.\n5. Cover and refrigerate before use.\nFINISH / SERVICE:\n• Stir well before service.\n• Use as dip or sauce as needed.\nCRITICAL NOTES:\n• Blend well for smooth consistency.\n• Adjust jalapeño to control heat level.\n• Keep refrigerated at all times.\n• Discard after 3 days.", "ES": "NOMBRE DEL PRODUCTO: Salsa de Aguacate\nCATEGORÍA: Aderezos\nRENDIMIENTO: 1.5 qt\nTIEMPO DE COCCIÓN: N/A\nVIDA ÚTIL: 3 días\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nCrema agria – 1.5 tazas\nMayonesa – 1/2 taza\nPuré de ajo – 5 cucharadas\nSal kosher – 2 cucharaditas\nPimienta negra – 1 cucharadita\nCilantro picado – 1 taza\nJugo de limón recién exprimido – 1/4 taza\nJalapeño fresco picado – 3 unidades\nPREPARACIÓN / PROCEDIMIENTO:\n1. Colocar la crema agria y la mayonesa en un recipiente.\n2. Agregar el puré de ajo, la sal kosher y la pimienta negra.\n3. Agregar el cilantro picado, el jugo de limón y el jalapeño picado.\n4. Mezclar o licuar hasta que quede suave y bien integrado.\n5. Tapar y refrigerar antes de usar.\nTERMINADO / SERVICIO:\n• Revolver bien antes de servir.\n• Usar como salsa o dip según sea necesario.\nNOTAS IMPORTANTES:\n• Licuar bien para lograr una textura suave.\n• Ajustar el jalapeño para controlar el picante.\n• Mantener refrigerado en todo momento.\n• Desechar después de 3 días."}, {"name": "Chipotle Aoili", "EN": "", "ES": ""}, {"name": "Cilantro Ranch", "EN": "ITEM NAME: Cilantro Ranch\nCATEGORY: Dressings\nYIELD: 4 qt\nCOOK TIME: N/A\nSHELF LIFE: 5 days\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nChopped Cilantro – 2 cups\nRanch Dressing – 1 gal\nSalsa Verde – 1/4 cup to 3 cups (adjust to taste)\nGarlic Purée – 1 tbsp\nLime Juice – 6 tbsp\nPREPARATION / PROCEDURE:\n1. Place ranch dressing into a mixing container.\n2. Add chopped cilantro, garlic purée, and lime juice.\n3. Add salsa verde gradually, starting with 1/4 cup.\n4. Mix or blend until fully smooth and evenly combined.\n5. Adjust salsa verde as needed for desired flavor and color.\n6. Cover and refrigerate before use.\nFINISH / SERVICE:\n• Stir well before service.\n• Use as dressing or sauce as needed.\nCRITICAL NOTES:\n• Add salsa verde slowly to control flavor and heat.\n• Blend well for smooth consistency.\n• Keep refrigerated at all times.\n• Discard after 5 days.", "ES": "NOMBRE DEL PRODUCTO: Ranch de Cilantro\nCATEGORÍA: Aderezos\nRENDIMIENTO: 4 qt\nTIEMPO DE COCCIÓN: N/A\nVIDA ÚTIL: 5 días\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nCilantro picado – 2 tazas\nAderezo ranch – 1 galón\nSalsa verde – 1/4 taza a 3 tazas (ajustar al gusto)\nPuré de ajo – 1 cucharada\nJugo de limón – 6 cucharadas\nPREPARACIÓN / PROCEDIMIENTO:\n1. Colocar el aderezo ranch en un recipiente.\n2. Agregar el cilantro picado, el puré de ajo y el jugo de limón.\n3. Agregar la salsa verde poco a poco, comenzando con 1/4 taza.\n4. Mezclar o licuar hasta que quede completamente suave e integrado.\n5. Ajustar la cantidad de salsa verde según el sabor y color deseado.\n6. Tapar y refrigerar antes de usar.\nTERMINADO / SERVICIO:\n• Revolver bien antes de servir.\n• Usar como aderezo o salsa según sea necesario.\nNOTAS IMPORTANTES:\n• Agregar la salsa verde poco a poco para controlar el sabor.\n• Licuar bien para una textura suave.\n• Mantener refrigerado en todo momento.\n• Desechar después de 5 días."}, {"name": "Mango Vinaigrette", "EN": "", "ES": ""}, {"name": "Chipotle Ranch", "EN": "ITEM NAME: Chipotle Ranch\nCATEGORY: Dressings\nYIELD: 1 gal\nCOOK TIME: N/A\nSHELF LIFE: 5 days\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nRanch Dressing – 1 gal\nChipotle Adobo Sauce – 1 can\nPREPARATION / PROCEDURE:\n1. Place ranch dressing into a mixing container.\n2. Add chipotle adobo sauce.\n3. Mix or blend until fully smooth and evenly combined.\n4. Cover and refrigerate before use.\nFINISH / SERVICE:\n• Stir well before service.\n• Use as dressing or sauce as needed.", "ES": "NOMBRE DEL PRODUCTO: Ranch con Chipotle\nCATEGORÍA: Aderezos\nRENDIMIENTO: 1 galón\nTIEMPO DE COCCIÓN: N/A\nVIDA ÚTIL: 5 días\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nAderezo ranch – 1 galón\nSalsa de chipotle en adobo – 1 lata\nPREPARACIÓN / PROCEDIMIENTO:\n1. Colocar el aderezo ranch en un recipiente.\n2. Agregar la salsa de chipotle en adobo.\n3. Mezclar o licuar hasta que quede completamente suave y bien integrado.\n4. Tapar y refrigerar antes de usar.\nTERMINADO / SERVICIO:\n• Revolver bien antes de servir.\n• Usar como aderezo o salsa según sea necesario.\nNOTAS IMPORTANTES:\n• Licuar bien para lograr picante y color uniforme.\n• Mantener refrigerado en todo momento.\n• Desechar después de 5 días."}, {"name": "Oregano Vinaigrette", "EN": "ITEM NAME: Oregano Vinaigrette\nCATEGORY: Dressings\nYIELD: 6 qt\nCOOK TIME: N/A\nSHELF LIFE: 5 days\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nMayonnaise – 1 gal\nDried Oregano – 1 cup\nRed Vinegar – 2 cups\nGarlic Cloves – 20 ea\nButtermilk – 1 qt\nHoney Mustard – 1/2 cup\nBlack Pepper – 2 tbsp\nSalt – 2 tbsp\nPREPARATION / PROCEDURE:\n1. Place mayonnaise, buttermilk, and honey mustard into a mixing container.\n2. Add red vinegar and mix until smooth.\n3. Add garlic cloves and dried oregano.\n4. Add black pepper and salt.\n5. Blend or mix thoroughly until fully smooth and incorporated.\n6. Cover and refrigerate before use.\nFINISH / SERVICE:\n• Stir well before service.\n• Use as dressing or sauce as needed.\nCRITICAL NOTES:\n• Blend until garlic is fully broken down.\n• Keep refrigerated at all times.\n• Discard after 5 days.", "ES": "NOMBRE DEL PRODUCTO: Vinagreta de Orégano\nCATEGORÍA: Aderezos\nRENDIMIENTO: 6 qt\nTIEMPO DE COCCIÓN: N/A\nVIDA ÚTIL: 5 días\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nMayonesa – 1 galón\nOrégano seco – 1 taza\nVinagre rojo – 2 tazas\nDientes de ajo – 20 unidades\nSuero de leche (buttermilk) – 1 qt\nMostaza con miel – 1/2 taza\nPimienta negra – 2 cucharadas\nSal – 2 cucharadas\nPREPARACIÓN / PROCEDIMIENTO:\n1. Colocar la mayonesa, el suero de leche y la mostaza con miel en un recipiente.\n2. Agregar el vinagre rojo y mezclar hasta que quede suave.\n3. Agregar los dientes de ajo y el orégano seco.\n4. Agregar la pimienta negra y la sal.\n5. Licuar o mezclar muy bien hasta que quede completamente suave e integrado.\n6. Tapar y refrigerar antes de usar.\nTERMINADO / SERVICIO:\n• Revolver bien antes de servir.\n• Usar como aderezo o salsa según sea necesario.\nNOTAS IMPORTANTES:\n• Licuar hasta que el ajo esté completamente integrado.\n• Mantener refrigerado en todo momento.\n• Desechar después de 5 días."}], "Produce": [{"name": "Black Bean Salsa", "EN": "ITEM NAME: Black Bean Salsa\nCATEGORY: Produce\nYIELD: 2 qt\nCOOK TIME: N/A\nSHELF LIFE: Same day\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nBlack Beans with Bean Water – 3 cups\nPico de Gallo – 1 cup\nPREPARATION / PROCEDURE:\n1. Measure black beans with bean water into a mixing container.\n2. Add pico de gallo.\n3. Mix gently until evenly combined.\n4. Cover and refrigerate until use.\nFINISH / SERVICE:\n• Ready to use once mixed.\n• Serve chilled.\nCRITICAL NOTES:\n• Do not drain beans; include bean water.\n• Mix gently to avoid breaking beans.\n• Use same day for best quality.", "ES": "NOMBRE DEL PRODUCTO: Salsa de Frijol Negro\nCATEGORÍA: Produce\nRENDIMIENTO: 2 qt\nTIEMPO DE COCCIÓN: N/A\nVIDA ÚTIL: Mismo día\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nFrijoles negros con su agua – 3 tazas\nPico de Gallo – 1 taza\nPREPARACIÓN / PROCEDIMIENTO:\n1. Medir los frijoles negros con su agua y colocarlos en un recipiente.\n2. Agregar el pico de gallo.\n3. Mezclar suavemente hasta que quede bien integrado.\n4. Tapar y refrigerar hasta su uso.\nTERMINADO / SERVICIO:\n• Listo para usar una vez mezclado.\n• Servir frío.\nNOTAS IMPORTANTES:\n• No escurrir los frijoles; usar el agua del frijol.\n• Mezclar suavemente para no quebrar los frijoles.\n• Usar el mismo día para mejor calidad."}, {"name": "Salad Mix", "EN": "ITEM NAME: Salad Mix\nCATEGORY: Produce\nYIELD: N/A\nCOOK TIME: N/A\nSHELF LIFE: Same day\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nRomaine Lettuce – 50%\nIceberg Lettuce – 50%\nPREPARATION / PROCEDURE:\n1. Wash romaine and iceberg lettuce thoroughly.\n2. Spin dry completely until no excess moisture remains.\n3. Chop lettuce to standard salad size.\n4. Combine romaine and iceberg at a 50/50 ratio.\n5. Mix gently until evenly blended.\n6. Cover and refrigerate until use.\nFINISH / SERVICE:\n• Ready to use once mixed.\n• Use as base for all salads.\nCRITICAL NOTES:\n• Lettuce must be completely dry before mixing.\n• Do not over-handle to prevent bruising.\n• Use same day for best freshness.", "ES": "NOMBRE DEL PRODUCTO: Mezcla de Lechuga\nCATEGORÍA: Produce\nRENDIMIENTO: N/A\nTIEMPO DE COCCIÓN: N/A\nVIDA ÚTIL: Mismo día\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nLechuga romana – 50%\nLechuga iceberg – 50%\nPREPARACIÓN / PROCEDIMIENTO:\n1. Lavar bien la lechuga romana y la lechuga iceberg.\n2. Secar completamente en centrifugadora hasta que no quede humedad.\n3. Cortar la lechuga al tamaño estándar para ensalada.\n4. Mezclar la lechuga romana y la iceberg en proporción 50/50.\n5. Mezclar suavemente hasta integrar.\n6. Tapar y refrigerar hasta su uso.\nTERMINADO / SERVICIO:\n• Listo para usar una vez mezclado.\n• Usar como base para todas las ensaladas.\nNOTAS IMPORTANTES:\n• La lechuga debe estar completamente seca antes de mezclar.\n• No manipular en exceso para evitar que se maltrate.\n• Usar el mismo día para mejor frescura."}, {"name": "Fire Roasted Veggies", "EN": "ITEM NAME: Fire Roasted Veggies\nCATEGORY: Produce\nYIELD: 1 full pan\nCOOK TIME: Roast until tender\nSHELF LIFE: Same day\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nSquash – 6 ea\nZucchini – 6 ea\nPoblano Peppers – 4 ea\nSteak Marinade – 2 cups\nPortobello Mushrooms – 1/2 cap (added to order)\nPREPARATION / PROCEDURE:\n1. Slice squash and zucchini into even-sized pieces.\n2. Cut poblano peppers into strips and remove seeds.\n3. Place squash, zucchini, and poblanos into a mixing container.\n4. Add steak marinade and mix until vegetables are evenly coated.\n5. Roast vegetables until tender and lightly charred.\n6. Portion roasted vegetables into a full pan for service.\nFINISH / SERVICE:\n• Add portobello mushrooms per order as needed.\n• Serve hot.\nCRITICAL NOTES:\n• Do not overcook vegetables.\n• Keep refrigerated when not in use.\n• Use same day for best quality.", "ES": "NOMBRE DEL PRODUCTO: Verduras Asadas al Fuego\nCATEGORÍA: Produce\nRENDIMIENTO: 1 bandeja completa\nTIEMPO DE COCCIÓN: Asar hasta que estén suaves\nVIDA ÚTIL: Mismo día\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nCalabaza – 6 unidades\nZucchini – 6 unidades\nChiles poblanos – 4 unidades\nMarinado para carne – 2 tazas\nHongos portobello – 1/2 tapa (agregado por orden)\nPREPARACIÓN / PROCEDIMIENTO:\n1. Cortar la calabaza y el zucchini en piezas parejas.\n2. Cortar los chiles poblanos en tiras y retirar las semillas.\n3. Colocar la calabaza, el zucchini y los poblanos en un recipiente.\n4. Agregar el marinado para carne y mezclar hasta cubrir bien las verduras.\n5. Asar las verduras hasta que estén suaves y ligeramente doradas.\n6. Porcionar las verduras asadas en una bandeja completa para el servicio.\nTERMINADO / SERVICIO:\n• Agregar los hongos portobello por orden según sea necesario.\n• Servir caliente.\nNOTAS IMPORTANTES:\n• No sobre cocinar las verduras.\n• Mantener refrigerado cuando no esté en uso.\n• Usar el mismo día para mejor calidad."}, {"name": "Avocado Rolls", "EN": "ITEM NAME: Avocado Rolls\nCATEGORY: Produce\nYIELD: 45 rolls\nCOOK TIME: N/A\nSHELF LIFE: Same day\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nAvocados – 45 ea\nSun-dried Tomatoes – 10 oz\nDiced Red Onion – 6 oz\nChopped Cilantro – 1 cup\nBlack Pepper – 1 tbsp\nSalt – 2 tbsp\nOil – 1/4 cup\nEgg Roll Wrappers – 45 ea (cut smaller)\nPREPARATION / PROCEDURE:\n1. Dice avocados and place into a large mixing container.\n2. Add sun-dried tomatoes, diced red onion, and chopped cilantro.\n3. Add black pepper, salt, and oil.\n4. Mix gently until evenly combined.\n5. Portion filling into cut egg roll wrappers.\n6. Roll tightly and seal.\nFINISH / SERVICE:\n• Assemble rolls as close to service as possible.\n• Serve fresh.\nCRITICAL NOTES:\n• Do not overmix to prevent avocados from breaking down.\n• Keep filling covered and refrigerated.\n• Use same day for best quality.", "ES": "NOMBRE DEL PRODUCTO: Rollos de Aguacate\nCATEGORÍA: Produce\nRENDIMIENTO: 45 rollos\nTIEMPO DE COCCIÓN: N/A\nVIDA ÚTIL: Mismo día\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nAguacates – 45 unidades\nTomates secos – 10 oz\nCebolla morada picada – 6 oz\nCilantro picado – 1 taza\nPimienta negra – 1 cucharada\nSal – 2 cucharadas\nAceite – 1/4 taza\nWrappers de egg roll – 45 unidades (cortados más pequeños)\nPREPARACIÓN / PROCEDIMIENTO:\n1. Picar los aguacates y colocarlos en un recipiente grande.\n2. Agregar los tomates secos, la cebolla morada y el cilantro.\n3. Agregar la pimienta negra, la sal y el aceite.\n4. Mezclar suavemente hasta integrar bien.\n5. Porcionar el relleno en los wrappers de egg roll.\n6. Enrollar bien apretado y sellar.\nTERMINADO / SERVICIO:\n• Armar los rollos lo más cerca posible del servicio.\n• Servir frescos.\nNOTAS IMPORTANTES:\n• No sobre mezclar para evitar que el aguacate se deshaga.\n• Mantener el relleno tapado y refrigerado.\n• Usar el mismo día para mejor calidad."}, {"name": "Mexican Turnip Greens", "EN": "ITEM NAME: Mexican Turnip Greens\nCATEGORY: Produce\nYIELD: 8 qt\nCOOK TIME: N/A\nSHELF LIFE: 3 days\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nTurnip Greens – 2.5 lb\nCumin – 1 tbsp\nHuey Luey’s Hot Sauce – 3 tbsp\nDiced Tomatoes – 2 cups\nDiced White Onions – 1 cup\nChicken Broth – 4 qt\nPREPARATION / PROCEDURE:\n1. Rinse turnip greens thoroughly and remove any tough stems.\n2. Chop greens into bite-size pieces.\n3. In a large container or pot, combine chicken broth, diced tomatoes, and diced white onions.\n4. Add cumin and Huey Luey’s hot sauce.\n5. Add turnip greens and mix well until fully incorporated.\n6. Allow flavors to combine before service.\nFINISH / SERVICE:\n• Stir well before service.\n• Serve chilled or heated per recipe application.\nCRITICAL NOTES:\n• Greens must remain fully submerged in liquid.\n• Keep refrigerated at all times.\n• Discard after 3 days.", "ES": "NOMBRE DEL PRODUCTO: Hojas de Nabo a la Mexicana\nCATEGORÍA: Produce\nRENDIMIENTO: 8 qt\nTIEMPO DE COCCIÓN: N/A\nVIDA ÚTIL: 3 días\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nHojas de nabo – 2.5 lb\nComino – 1 cucharada\nSalsa picante Huey Luey’s – 3 cucharadas\nTomate picado – 2 tazas\nCebolla blanca picada – 1 taza\nCaldo de pollo – 4 qt\nPREPARACIÓN / PROCEDIMIENTO:\n1. Lavar bien las hojas de nabo y retirar los tallos duros.\n2. Cortar las hojas en trozos medianos.\n3. En un recipiente grande u olla, mezclar el caldo de pollo, el tomate picado y la cebolla blanca.\n4. Agregar el comino y la salsa picante Huey Luey’s.\n5. Agregar las hojas de nabo y mezclar bien.\n6. Dejar reposar para que los sabores se integren antes de servir.\nTERMINADO / SERVICIO:\n• Revolver bien antes de servir.\n• Servir frío o caliente según la preparación.\nNOTAS IMPORTANTES:\n• Las hojas deben quedar completamente sumergidas en el líquido.\n• Mantener refrigerado en todo momento.\n• Desechar después de 3 días."}, {"name": "Jalapeño Coleslaw", "EN": "ITEM NAME: Jalapeño Coleslaw\nCATEGORY: Produce\nYIELD: 16 qt\nCOOK TIME: N/A\nSHELF LIFE: 3 days\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nGreen Cabbage – 8 lb\nRed Cabbage – 4 lb\nChopped Cilantro – 8 oz\nFresh Jalapeños – 8 ea\nWhite Onion – 2 cups\nWhite Vinegar – 2 cups\nSalt – 2 tbsp\nBlack Pepper – 1 tbsp\nSugar – 1/2 cup\nMayonnaise – 1.5 gallons\nPREPARATION / PROCEDURE:\n1. Thinly slice green and red cabbage and place in a large mixing container.\n2. Add chopped cilantro, diced jalapeños, and white onion.\n3. In a separate container, combine white vinegar, salt, black pepper, and sugar.\n4. Mix until sugar is fully dissolved.\n5. Add mayonnaise to the vinegar mixture and whisk until smooth.\n6. Pour dressing over cabbage mixture.\n7. Mix thoroughly until cabbage is evenly coated.\n8. Cover and refrigerate before use.\nFINISH / SERVICE:\n• Allow to chill before service for best flavor.\n• Serve cold.\nCRITICAL NOTES:\n• Mix thoroughly to ensure even coating.\n• Keep refrigerated at all times.\n• Discard after 3 days.", "ES": "NOMBRE DEL PRODUCTO: Ensalada de Repollo con Jalapeño\nCATEGORÍA: Produce\nRENDIMIENTO: 16 qt\nTIEMPO DE COCCIÓN: N/A\nVIDA ÚTIL: 3 días\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nRepollo verde – 8 lb\nRepollo morado – 4 lb\nCilantro picado – 8 oz\nJalapeños frescos – 8 unidades\nCebolla blanca – 2 tazas\nVinagre blanco – 2 tazas\nSal – 2 cucharadas\nPimienta negra – 1 cucharada\nAzúcar – 1/2 taza\nMayonesa – 1.5 galones\nPREPARACIÓN / PROCEDIMIENTO:\n1. Cortar finamente el repollo verde y el repollo morado y colocarlos en un recipiente grande.\n2. Agregar el cilantro picado, los jalapeños picados y la cebolla blanca.\n3. En un recipiente separado, mezclar el vinagre blanco, la sal, la pimienta negra y el azúcar.\n4. Mezclar hasta que el azúcar se disuelva completamente.\n5. Agregar la mayonesa a la mezcla de vinagre y batir hasta que quede suave.\n6. Verter el aderezo sobre la mezcla de repollo.\n7. Mezclar bien hasta que todo el repollo quede cubierto.\n8. Tapar y refrigerar antes de usar.\nTERMINADO / SERVICIO:\n• Dejar reposar en refrigeración antes de servir para mejor sabor.\n• Servir frío.\nNOTAS IMPORTANTES:\n• Mezclar bien para cubrir el repollo de manera uniforme.\n• Mantener refrigerado en todo momento.\n• Desechar después de 3 días."}, {"name": "Mango Salsa", "EN": "ITEM NAME: Mango Salsa\nCATEGORY: Produce\nYIELD: 4 qt\nCOOK TIME: N/A\nSHELF LIFE: Same day\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nMangos – 5–6 ea (depending on size)\nBell Pepper – 2 ea\nRed Onion – 1 ea\nChopped Cilantro – 1 cup\nFresh Lime Juice – 2 tbsp\nKosher Salt – 2 tbsp\nChili Powder – 1 tsp\nPREPARATION / PROCEDURE:\n1. Peel and dice mangos into small, even pieces.\n2. Dice bell peppers and red onion to a similar size.\n3. Combine mangos, bell peppers, and red onion in a mixing container.\n4. Add chopped cilantro, fresh lime juice, kosher salt, and chili powder.\n5. Mix gently until evenly combined.\n6. Taste and adjust seasoning if needed.\nFINISH / SERVICE:\n• Ready to use once mixed.\n• Serve chilled.\nCRITICAL NOTES:\n• Do not overmix to avoid breaking down mangos.\n• Keep refrigerated at all times.\n• Use same day for best freshness and color.", "ES": "NOMBRE DEL PRODUCTO: Salsa de Mango\nCATEGORÍA: Produce\nRENDIMIENTO: 4 qt\nTIEMPO DE COCCIÓN: N/A\nVIDA ÚTIL: Mismo día\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nMangos – 5–6 unidades (dependiendo del tamaño)\nPimiento morrón – 2 unidades\nCebolla morada – 1 unidad\nCilantro picado – 1 taza\nJugo de limón fresco – 2 cucharadas\nSal kosher – 2 cucharadas\nChile en polvo – 1 cucharadita\nPREPARACIÓN / PROCEDIMIENTO:\n1. Pelar y picar los mangos en trozos pequeños y parejos.\n2. Picar el pimiento y la cebolla morada en tamaño similar.\n3. Colocar los mangos, el pimiento y la cebolla en un recipiente.\n4. Agregar el cilantro, el jugo de limón, la sal kosher y el chile en polvo.\n5. Mezclar suavemente hasta que todo quede bien integrado.\n6. Probar y ajustar la sazón si es necesario.\nTERMINADO / SERVICIO:\n• Listo para usar una vez mezclado.\n• Servir frío.\nNOTAS IMPORTANTES:\n• No sobre mezclar para evitar que el mango se deshaga.\n• Mantener refrigerado en todo momento.\n• Usar el mismo día para mejor frescura y color."}, {"name": "Grilled Corn", "EN": "ITEM NAME: Corn\nCATEGORY: Produce\nYIELD: 1 pan\nCOOK TIME: N/A\nSHELF LIFE: Same day\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nFresh Corn – 1/2 case\nFrozen Corn – 2.5 qt\nSalt – 2 tbsp\nHuey Luey’s Seasoning – as needed (for flat top)\nPREPARATION / PROCEDURE:\n1. Shuck fresh corn and remove kernels.\n2. Place fresh corn and frozen corn into a mixing container.\n3. Add salt.\n4. Mix thoroughly until evenly combined.\n5. Cover and refrigerate until use.\nPREPARATION / PROCEDURE:\n1. Grill fresh corn on the grill until lightly charred.\n2. Allow grilled corn to cool slightly.\n3. Shave kernels off the grilled corn and place into a mixing container.\n4. Boil frozen corn until fully heated.\n5. Drain frozen corn well.\n6. Add boiled frozen corn to the container with grilled corn.\n7. Add salt.\n8. Mix thoroughly until evenly combined.\n9. Cover and refrigerate until use.\nFINISH / SERVICE:\n• When searing on the flat top, add corn to a hot surface.\n• Season with Huey Luey’s seasoning.\n• Mix and toss evenly while searing.\n• Cook until heated through and lightly caramelized.\nCRITICAL NOTES:\n• Drain frozen corn completely before mixing.\n• Mix thoroughly for even seasoning.\n• Keep refrigerated at all times when not in use.\n• Use same day for best quality.", "ES": "NOMBRE DEL PRODUCTO: Elote Asado\nCATEGORÍA: Produce\nRENDIMIENTO: 1 bandeja\nTIEMPO DE COCCIÓN: N/A\nVIDA ÚTIL: Mismo día\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nElote fresco – 1/2 caja\nElote congelado – 2.5 qt\nSal – 2 cucharadas\nSazonador Huey Luey’s – según necesidad (para la plancha)\nPREPARACIÓN / PROCEDIMIENTO:\n1. Pelar el elote fresco y retirar los granos.\n2. Colocar el elote fresco y el elote congelado en un recipiente para mezclar.\n3. Agregar la sal.\n4. Mezclar bien hasta integrar de manera uniforme.\n5. Tapar y refrigerar hasta usar.\nPREPARACIÓN / PROCEDIMIENTO:\n1. Asar el elote fresco en la parrilla hasta que esté ligeramente tatemado.\n2. Dejar que el elote asado se enfríe ligeramente.\n3. Cortar los granos del elote asado y colocarlos en un recipiente para mezclar.\n4. Hervir el elote congelado hasta que esté completamente caliente.\n5. Escurrir bien el elote congelado.\n6. Agregar el elote congelado hervido al recipiente con el elote asado.\n7. Agregar la sal.\n8. Mezclar bien hasta integrar de manera uniforme.\n9. Tapar y refrigerar hasta usar.\nTERMINADO / SERVICIO:\n• Al sellar en la plancha, agregar el elote sobre una superficie caliente.\n• Sazonar con sazonador Huey Luey’s.\n• Mezclar y mover de manera uniforme mientras se sella.\n• Cocinar hasta que esté bien caliente y ligeramente caramelizado.\nNOTAS IMPORTANTES:\n• Escurrir completamente el elote congelado antes de mezclar.\n• Mezclar bien para distribuir el sazón de manera uniforme.\n• Mantener refrigerado en todo momento cuando no esté en uso.\n• Usar el mismo día para mejor calidad."}, {"name": "Pickled Onions", "EN": "", "ES": ""}, {"name": "Guacamole", "EN": "ITEM NAME: Guacamole\nCATEGORY: Produce\nYIELD: 5 qt\nPREP TIME: 15 minutes\nSHELF LIFE: Same day\nSTORAGE: Covered, airtight, and refrigerated\nINGREDIENTS:\nAvocados – 35 ea\nChopped Cilantro – 2 cups\nDiced Onion – 3 cups\nDiced Jalapeño – 1/4 cup\nLime Juice – 1/4 cup\nSalt – 1 tbsp\nPREPARATION / PROCEDURE:\n1. Cut avocados in half, remove the pit, and scoop the flesh into a container.\n2. Mash avocados to the desired consistency.\n3. Place wax paper directly against the avocado surface to seal out air.\n4. Place the container inside a plastic bag if needed for extra protection.\n5. In a separate container, mix cilantro, onion, and jalapeño.\n6. In a separate cup, mix lime juice and salt.\n7. Refrigerate all components separately until use.\nFINISH / SERVICE:\n• When ready to use, remove wax paper from the avocado.\n• Add the cilantro, onion, and jalapeño mixture and the lime juice with salt.\n• Mix gently until combined.\n• Serve immediately after mixing.\nCRITICAL NOTES:\n• Always keep wax paper pressed directly against the avocado to prevent oxidation.\n• Store components separately.\n• Replace wax paper before refrigerating.\n• Use the same day for best quality.", "ES": "NOMBRE DEL PRODUCTO: Guacamole\nCATEGORÍA: Produce\nRENDIMIENTO: 5 qt\nTIEMPO DE PREPARACIÓN: 15 minutos\nVIDA ÚTIL: Mismo día\nALMACENAMIENTO: Tapado, hermético y refrigerado\nINGREDIENTES:\nAguacates – 35 unidades\nCilantro picado – 2 tazas\nCebolla picada – 3 tazas\nJalapeño picado – 1/4 taza\nJugo de limón – 1/4 taza\nSal – 1 cucharada\nPREPARACIÓN / PROCEDIMIENTO:\n1. Cortar los aguacates por la mitad, retirar la semilla y sacar la pulpa a un recipiente.\n2. Machacar los aguacates hasta la consistencia deseada.\n3. Colocar papel encerado directamente sobre la superficie del aguacate para sellar sin aire.\n4. Colocar el recipiente dentro de una bolsa plástica si es necesario para mayor protección.\n5. En un recipiente separado, mezclar el cilantro, la cebolla y el jalapeño.\n6. En un vaso separado, mezclar el jugo de limón y la sal.\n7. Refrigerar todos los componentes por separado hasta su uso.\nTERMINADO / SERVICIO:\n• Al momento de usar, retirar el papel encerado del aguacate.\n• Agregar la mezcla de cilantro, cebolla y jalapeño y el jugo de limón con sal.\n• Mezclar suavemente hasta integrar.\n• Servir inmediatamente después de mezclar.\nNOTAS IMPORTANTES:\n• Mantener siempre el papel encerado pegado al aguacate para evitar oxidación.\n• Guardar los componentes por separado.\n• Volver a colocar papel encerado antes de refrigerar.\n• Usar el mismo día para mejor calidad."}, {"name": "Pico De Gallo", "EN": "ITEM NAME: Pico de Gallo\nCATEGORY: Produce\nYIELD: 4 full 1/3 pans\nPREP TIME: 30 minutes\nSHELF LIFE: Same day\nSTORAGE: Covered and refrigerated\nINGREDIENTS:\nDiced Tomatoes – 20 lb\nDiced Onions – 6 lb\nLime Juice – 1 cup\nSalt – 8 tbsp\nChopped Cilantro – 8 cups\nFresh Jalapeños, diced – 1 cup\nPREPARATION / PROCEDURE:\n1. Dice tomatoes and onions into small, even pieces.\n2. Finely chop cilantro and fresh jalapeños.\n3. Combine tomatoes, onions, cilantro, and jalapeños in a large container.\n4. Add lime juice and salt.\n5. Gently mix until evenly incorporated.\n6. Taste and adjust salt if needed.\nFINISH / SERVICE:\n• Ready to use once fully mixed.\n• Serve chilled.\nCRITICAL NOTES:\n• Do not overmix.\n• Keep refrigerated at all times.\n• Use same day for best quality.", "ES": "NOMBRE DEL PRODUCTO: Pico de Gallo\nCATEGORÍA: Produce\nRENDIMIENTO: 4 bandejas completas de 1/3\nTIEMPO DE PREPARACIÓN: 30 minutos\nVIDA ÚTIL: Mismo día\nALMACENAMIENTO: Tapado y refrigerado\nINGREDIENTES:\nTomate picado – 20 lb\nCebolla picada – 6 lb\nJugo de limón – 1 taza\nSal – 8 cucharadas\nCilantro picado – 8 tazas\nJalapeño fresco picado – 1 taza\nPREPARACIÓN / PROCEDIMIENTO:\n1. Picar el tomate y la cebolla en tamaño pequeño y parejo.\n2. Picar finamente el cilantro y el jalapeño fresco.\n3. Mezclar el tomate, la cebolla, el cilantro y el jalapeño en un recipiente grande.\n4. Agregar el jugo de limón y la sal.\n5. Mezclar suavemente hasta que todo esté bien integrado.\n6. Probar y ajustar la sal si es necesario.\nTERMINADO / SERVICIO:\n• Listo para usar una vez bien mezclado.\n• Servir frío.\nNOTAS IMPORTANTES:\n• No sobre mezclar.\n• Mantener refrigerado todo el tiempo.\n• Usar el mismo día para mejor calidad."}]};

function formatRecipeText(text){
  if(!text){return `<div class="empty">${esc(currentLang==='ES'?'No hay texto de receta en este idioma todavía.':'No recipe text has been entered for this language yet.')}</div>`}
  return String(text).split('\n').map(raw=>{
    const line=raw.trimEnd();
    if(!line.trim()) return '<div class="line">&nbsp;</div>';
    const clean=line.trim();
    const cls = (/^[A-ZÁÉÍÓÚÜÑ0-9 &/()\-]+:$/.test(clean) || /^(ITEM NAME|NOMBRE DEL PRODUCTO|CATEGORY|CATEGORÍA|PORTION SIZE|TAMAÑO DE PORCIÓN|YIELD|RENDIMIENTO|PREP TIME|TIEMPO DE PREPARACIÓN|COOK TIME|TIEMPO DE COCCIÓN|HOLD TIME|TIEMPO DE MANTENIMIENTO|STORAGE|ALMACENAMIENTO):/.test(clean)) ? 'sectionLine' : (/^•/.test(clean) ? 'bulletLine' : (/^\d+\./.test(clean) ? 'numberLine' : 'line'));
    return `<div class="${cls}">${esc(line)}</div>`;
  }).join('')
}

async function uploadPhoto(e){
  const file=e.target.files&&e.target.files[0];
  if(!file)return;
  const key=recipeKey(currentCategory,currentItemName);
  try{
    setSyncStatus('Saving Photo…','');
    const blob=await resizeImageFile(file,1400,.82);
    photos[key]=await blobToDataURL(blob);
    saveJSON(PHOTO_KEY,photos);
    renderRecipe(currentCategory,currentItemName);
    setSyncStatus('Photo Saved Local','');
  }catch(err){
    console.error(err);
    alert('Photo upload failed. Try a smaller photo.');
    setSyncStatus('Photo Error','error');
  }
}
function removePhoto(){delete photos[recipeKey(currentCategory,currentItemName)]; saveJSON(PHOTO_KEY,photos); renderRecipe(currentCategory,currentItemName); autoSync()}

function autoSync(){if(FIREBASE_SETTINGS.enabled&&navigator.onLine){window.clearTimeout(window.__hueySyncTimer); window.__hueySyncTimer=window.setTimeout(()=>syncNow(false),700)}}
function safePath(value){return String(value).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,120)||'recipe'}
function blobToDataURL(blob){return new Promise((resolve,reject)=>{const r=new FileReader(); r.onload=()=>resolve(r.result); r.onerror=reject; r.readAsDataURL(blob)})}
function resizeImageFile(file,max=1400,quality=.82){return new Promise((resolve,reject)=>{const img=new Image(); const url=URL.createObjectURL(file); img.onload=()=>{const scale=Math.min(1,max/Math.max(img.width,img.height)); const canvas=document.createElement('canvas'); canvas.width=Math.max(1,Math.round(img.width*scale)); canvas.height=Math.max(1,Math.round(img.height*scale)); const ctx=canvas.getContext('2d'); ctx.drawImage(img,0,0,canvas.width,canvas.height); canvas.toBlob(blob=>{URL.revokeObjectURL(url); blob?resolve(blob):reject(new Error('Could not process image'))},'image/jpeg',quality)}; img.onerror=()=>{URL.revokeObjectURL(url); reject(new Error('Invalid image file'))}; img.src=url})}

async function initFirebase(){
  if(firebaseDb){return true}
  if(!FIREBASE_SETTINGS.enabled || !FIREBASE_SETTINGS.config){setSyncStatus('Local Only',''); return false}
  try{
    setSyncStatus('Connecting…','');
    const appMod = await import('https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js');
    const fsMod = await import('https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js');
    firebaseApp = appMod.getApps().length ? appMod.getApps()[0] : appMod.initializeApp(FIREBASE_SETTINGS.config);
    firebaseDb = fsMod.getFirestore(firebaseApp);
    firebaseFns = fsMod;
    setSyncStatus('Firebase Ready','online');
    return true;
  }catch(err){console.error(err); setSyncStatus('Sync Error','error'); return false}
}
async function syncNow(showAlert=true){
  if(!firebaseDb){const ok=await initFirebase(); if(!ok){if(showAlert)alert('Firebase is not configured yet.'); return}}
  try{
    setSyncStatus('Syncing…','');
    const {doc,getDoc,setDoc,serverTimestamp} = firebaseFns;
    const ref = doc(firebaseDb, FIREBASE_SETTINGS.collectionName, FIREBASE_SETTINGS.documentId);
    const snap = await getDoc(ref);
    const cloud = snap.exists()?snap.data():{};
    edits = Object.assign({}, cloud.edits||{}, edits||{});
    saveJSON(STORAGE_KEY,edits);
    await setDoc(ref,{edits,updatedAt:serverTimestamp(),version:4,appName:'Huey Lueys Prep Recipe Hub'},{merge:true});
    localStorage.setItem(LAST_SYNC_KEY, new Date().toISOString());
    setSyncStatus('Synced','online');
    if(currentItemName)renderRecipe(currentCategory,currentItemName); else if(currentCategory)renderItems(currentCategory); else renderCategories();
  }catch(err){console.error(err); setSyncStatus('Sync Error','error'); if(showAlert)alert('Firebase sync failed. Check Firestore rules, internet connection, and Vercel domain authorization.')}
}
window.addEventListener('online',()=>{if(FIREBASE_SETTINGS.enabled)syncNow(false)});
window.addEventListener('DOMContentLoaded',async()=>{await initFirebase(); renderCategories(); if(FIREBASE_SETTINGS.enabled&&navigator.onLine)syncNow(false);});
</script>
