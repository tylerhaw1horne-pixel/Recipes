<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Huey Luey’s Recipe Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
<style>
:root{
  --green:#23462b; --green2:#3f6f37; --orange:#c85f1f; --cream:#f4efe6; --paper:#fffdf8;
  --ink:#1e293b; --muted:#64748b; --line:#d9cfc2; --danger:#b91c1c; --shadow:0 6px 22px rgba(15,23,42,.12); --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;font-family:"Source Sans 3",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--cream);color:var(--ink);-webkit-text-size-adjust:100%}
body{overflow-y:auto;overflow-x:hidden;touch-action:manipulation} button,input,textarea,select{font-family:inherit} button{cursor:pointer;border:0}
.app{min-height:100vh;display:flex;flex-direction:column;background:var(--cream)}
.topbar{background:var(--green);color:#fff;position:sticky;top:0;z-index:20;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.headerrow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 18px}.brand{display:flex;align-items:center;gap:12px;min-width:0}.logoMark{width:76px;height:50px;background:#fff;border-radius:8px;display:grid;place-items:center;color:var(--orange);font-weight:900;font-size:24px;letter-spacing:-.04em}.apptitle{font-size:24px;font-weight:900;text-transform:uppercase;letter-spacing:.04em;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.subline{font-size:9px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;opacity:.78;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}.btn{border-radius:9px;padding:11px 15px;font-size:11px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;background:#1f2937;color:#fff;min-height:40px}.btn.primary{background:var(--green2)}.btn.orange{background:var(--orange)}.btn.danger{background:var(--danger)}.btn.small{padding:8px 10px;min-height:34px;font-size:9px}.syncBadge{border-radius:999px;padding:7px 10px;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;display:flex;gap:7px;align-items:center;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.12)}.dot{width:8px;height:8px;border-radius:50%;background:#f59e0b}.syncBadge.online .dot{background:#22c55e}.syncBadge.error .dot{background:#ef4444}
.searchbar{display:none;grid-template-columns:1fr auto;gap:8px;background:#1e3b25;padding:9px 18px}.searchbar.open{display:grid}.searchbar input{border:2px solid rgba(255,255,255,.25);border-radius:10px;padding:11px 12px;background:#fffaf4;font-size:14px;font-weight:700;color:var(--ink)}
#view{flex:1;padding:18px;display:flex;flex-direction:column;gap:14px}.crumbs{font-size:12px;font-weight:900;color:var(--green);letter-spacing:.09em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.back{display:inline-flex;align-items:center;gap:8px;min-height:42px;color:var(--green);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.06em;cursor:pointer}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}.card{background:#fff;border:2px solid rgba(35,70,43,.12);border-radius:var(--r);box-shadow:var(--shadow);padding:16px;min-height:92px;text-align:left;display:flex;align-items:center;justify-content:space-between;gap:12px;color:var(--ink)}.cardTitle{font-size:15px;font-weight:900;line-height:1.15;text-transform:uppercase}.cardMeta{font-size:10px;font-weight:800;color:var(--muted);margin-top:5px}.empty{color:var(--muted);font-style:italic;font-weight:800;background:#fff;border:2px dashed var(--line);border-radius:12px;padding:18px}
.recipe{background:#fff;border:2px solid rgba(35,70,43,.13);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;max-width:1180px;width:100%;margin:0 auto}.recipeInner{padding:16px}.recipeTop{display:grid;grid-template-columns:minmax(0,1fr) minmax(290px,360px);gap:14px}.recipeDoc{border:2px solid #e5ded5;border-radius:14px;padding:20px;background:#fff;min-height:640px}.docTop{display:flex;justify-content:space-between;gap:18px;border-bottom:4px solid var(--green);padding-bottom:12px;margin-bottom:14px}.docBrand{display:flex;align-items:center;gap:10px}.docLogo{width:94px;height:58px;display:grid;place-items:center;border:2px solid var(--line);border-radius:8px;color:var(--orange);font-size:26px;font-weight:900}.docTitle{font-size:25px;font-weight:900;text-transform:uppercase;color:var(--green);line-height:1}.docSub{font-size:10px;font-weight:900;letter-spacing:.22em;text-transform:uppercase;color:var(--orange);margin-top:5px}.docId{text-align:right;font-size:11px;font-weight:800;line-height:1.5;color:#111;min-width:145px}.recipeMeta{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin:12px 0}.metaBox{border:2px solid var(--line);border-radius:12px;background:#fffaf4;padding:9px}.metaLabel{font-size:7.8px;font-weight:900;text-transform:uppercase;color:var(--muted);letter-spacing:.08em}.metaValue{font-size:13px;font-weight:900;color:var(--green);margin-top:3px;line-height:1.15}.docSectionTitle{background:var(--green);color:#fff;border-radius:7px 7px 0 0;padding:7px 10px;font-size:10px;font-weight:900;letter-spacing:.15em;text-transform:uppercase}.recipeText{border:1.5px solid #ddd;border-radius:0 0 8px 8px;padding:10px;background:#fff;min-height:88px;line-height:1.38;font-size:12px;overflow-wrap:anywhere}.recipeText .line{margin-bottom:4px}.recipeText .sectionLine{margin:8px 0 5px;font-weight:900;color:var(--green);font-size:11px;text-transform:uppercase;border-bottom:1px solid var(--line);padding-bottom:3px}.recipeText .bulletLine,.recipeText .numberLine{padding-left:12px}.sidePanel{display:flex;flex-direction:column;gap:10px}.photoBox{border:2px dashed var(--line);border-radius:12px;background:#fffaf4;min-height:230px;display:grid;place-items:center;overflow:hidden;position:relative;text-align:center;color:var(--muted);font-weight:900;padding:12px}.photoBox img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}.photoHint{position:relative;z-index:1;font-size:11px;text-transform:uppercase;letter-spacing:.08em}.photoActions,.recipeActions{display:flex;gap:8px;flex-wrap:wrap}.fileInput{display:none}.statusNote{background:#fff4e8;border:2px solid #f0d2b4;border-radius:12px;padding:10px;color:#9a3412;font-size:11px;font-weight:800;line-height:1.35}.plateNotesBox{width:100%;min-height:135px;border:2px solid var(--line);border-radius:0 0 8px 8px;background:#fffaf4;padding:10px;font-size:13px;font-weight:700;resize:vertical}.printPhotos{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0 12px}.printPhotoBox{border:1.5px solid #ddd;border-radius:0 0 8px 8px;min-height:165px;background:#fffaf4;display:grid;place-items:center;overflow:hidden;color:var(--muted);font-size:10px;font-weight:900;text-transform:uppercase}.printPhotoBox img{width:100%;height:100%;object-fit:cover;display:block}.platePrintNotes{margin-top:10px}.footer{margin:0 18px 18px;color:var(--muted);font-size:10px;text-align:center;font-weight:800;text-transform:uppercase;letter-spacing:.08em}
.modalBackdrop{position:fixed;inset:0;z-index:1000;background:rgba(15,23,42,.65);display:none;align-items:center;justify-content:center;padding:18px}.modalBackdrop.open{display:flex}.modal{width:980px;max-width:96vw;max-height:92vh;background:var(--cream);border-radius:16px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.35);display:flex;flex-direction:column}.modalHead{background:var(--orange);color:#fff;padding:15px 18px;display:flex;align-items:center;justify-content:space-between}.modalTitle{font-size:16px;font-weight:900;text-transform:uppercase;letter-spacing:.08em}.formGrid{padding:18px;display:grid;grid-template-columns:1fr 1fr;gap:12px;overflow:auto}.field{display:flex;flex-direction:column;gap:5px}.field label{font-size:9px;font-weight:900;color:var(--green);letter-spacing:.12em;text-transform:uppercase}.field input,.field textarea{width:100%;border:2px solid var(--line);border-radius:10px;background:#fffaf4;padding:11px 12px;font-size:13px;font-weight:700;color:var(--ink)}.field textarea{min-height:320px;resize:vertical;line-height:1.4}.modalFoot{display:flex;justify-content:flex-end;gap:8px;padding:14px 18px;background:#fffaf4;border-top:2px solid var(--line)}
@media(max-width:900px){.headerrow{flex-direction:column;align-items:flex-start}.controls{width:100%;display:grid;grid-template-columns:repeat(4,minmax(0,1fr))}.controls .btn,.controls .syncBadge{justify-content:center;width:100%;font-size:9px;padding:10px 8px}.recipeTop{grid-template-columns:1fr}.sidePanel{display:grid;grid-template-columns:1fr 1fr}.formGrid{grid-template-columns:1fr}}
@media(max-width:640px){body{overflow-x:auto}.app,.topbar{min-width:900px}.headerrow{width:900px;flex-direction:row;align-items:center}.controls{display:flex;width:auto}.controls .btn,.controls .syncBadge{width:auto}.recipeTop{grid-template-columns:552px 288px}.sidePanel{display:flex}#view{width:900px}.footer{width:900px}}
@media print{@page{size:letter portrait;margin:.20in .18in .22in .18in}html,body{width:8.5in!important;max-width:8.5in!important;overflow:visible!important;background:#fff!important}.topbar,.footer,.back,.recipeActions,.photoActions,.statusNote,.modalBackdrop,.sidePanel{display:none!important}.app,#view{display:block!important;width:8.28in!important;max-width:8.28in!important;min-width:0!important;margin:0!important;padding:0!important;background:#fff!important}.recipe{display:block!important;width:8.22in!important;margin:0!important;border:0!important;box-shadow:none!important;border-radius:0!important}.recipeInner{padding:0!important}.recipeTop{display:block!important}.recipeDoc{width:8.18in!important;margin:0!important;padding:0!important;border:0!important;min-height:auto!important}.docTop{margin-bottom:9pt;padding-bottom:7pt}.docLogo{width:84px;height:52px}.docTitle{font-size:23pt}.docSub{font-size:8pt}.docId{font-size:8pt}.recipeMeta{grid-template-columns:repeat(3,1fr)!important;gap:6pt;margin:7pt 0}.metaBox{padding:6pt;border:1pt solid #ddd}.metaLabel{font-size:6.9pt}.metaValue{font-size:8.4pt}.docSectionTitle{font-size:8pt;padding:5pt 7pt}.recipeText{padding:7pt;min-height:0;font-size:8.4pt;line-height:1.22;border:1pt solid #ddd}.recipeText .line{margin-bottom:2pt}.recipeText .sectionLine{font-size:7.7pt;margin:4pt 0 2pt}.printPhotos{display:grid!important;grid-template-columns:1fr 1fr!important;gap:7pt!important;margin:6pt 0 8pt!important}.printPhotoBox{min-height:105pt!important;max-height:125pt!important;border:1pt solid #ddd!important;background:#fff!important}.printPhotoBox img{width:100%!important;height:125pt!important;object-fit:cover!important}.platePrintNotes{display:block!important;margin-top:7pt!important}}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="headerrow">
      <div class="brand"><div class="logoMark">HL</div><div style="min-width:0"><div class="apptitle">Huey Luey’s Recipe Hub</div><div class="subline" id="crumbs">Loading...</div></div></div>
      <div class="controls">
        <button class="btn primary" id="langBtn" onclick="toggleLang()">Ver Español</button>
        <button class="btn" onclick="toggleSearch()">Search</button>
        <button class="btn orange" onclick="printCurrent()">Print</button>
        <button class="syncBadge" id="syncStatus" type="button" onclick="loadBackend()"><span class="dot"></span><span id="syncText">Loading</span></button>
      </div>
    </div>
    <div class="searchbar" id="searchWrap"><input id="searchInput" placeholder="Search recipes / Buscar recetas..." oninput="handleSearch()" /><button class="btn" onclick="clearSearch()">Clear</button></div>
  </header>
  <main id="view"></main>
  <div class="footer">Huey Luey’s Recipe Hub • Google Sheets + Drive Backend • Print / PDF Ready</div>
</div>
<div class="modalBackdrop" id="editModal"><div class="modal"><div class="modalHead"><div class="modalTitle" id="editTitle">Edit Recipe</div><button class="btn" onclick="closeEditor()">Close</button></div><div class="formGrid"><div class="field"><label>English Item Name</label><input id="editNameEN" /></div><div class="field"><label>Spanish Display Name</label><input id="editNameES" /></div><div class="field"><label>English Recipe Text</label><textarea id="editEN"></textarea></div><div class="field"><label>Spanish Recipe Text</label><textarea id="editES"></textarea></div></div><div class="modalFoot"><button class="btn primary" onclick="saveRecipeEdits()">Save Recipe</button></div></div></div>
<script>
/*
  IMPORTANT:
  This version uses Google Apps Script as the backend.
  It loads recipes from the Google Sheet tabs created by RecipeHub_Code.gs.
  If you already have the full ORIGINAL_DATA object from the old app, paste it below and click Seed Sheet once.
*/
const ORIGINAL_DATA = {};
const CATEGORY_ES = {"Brunch":"Brunch","Desserts":"Postres","Entree Prep":"Preparación de Entradas","Sauces and Spices":"Salsas y Especias","Dressings":"Aderezos","Produce":"Productos Frescos"};
let currentLang='EN', currentCategory='', currentItemName='';
let recipeRows=[], mediaRows=[];
const byKey = () => Object.fromEntries(recipeRows.map(r => [r.key, r]));
const mediaByKey = () => Object.fromEntries(mediaRows.map(r => [r.key, r]));
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function jsArg(s){return esc(JSON.stringify(String(s||'')))}
function safeKey(category,name){return String((category||'')+'-'+(name||'')).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'')||'recipe'}
function setCrumbs(text){document.getElementById('crumbs').textContent=text}
function setSync(text,mode){const b=document.getElementById('syncStatus'),t=document.getElementById('syncText');t.textContent=text;b.classList.remove('online','error');if(mode)b.classList.add(mode)}
function printCurrent(){window.print()} function toggleSearch(){document.getElementById('searchWrap').classList.toggle('open');document.getElementById('searchInput').focus()} function clearSearch(){document.getElementById('searchInput').value='';handleSearch()}
function toggleLang(){currentLang=currentLang==='EN'?'ES':'EN';document.getElementById('langBtn').textContent=currentLang==='EN'?'Ver Español':'View English'; if(currentItemName)renderRecipe(currentCategory,currentItemName); else if(currentCategory)renderItems(currentCategory); else renderCategories()}
function displayCategory(c){return currentLang==='ES'?(CATEGORY_ES[c]||c):c}
function getRecipe(category,name){const key=safeKey(category,name);return byKey()[key]||recipeRows.find(r=>r.category===category&&r.nameEN===name)||null}
function getMedia(category,name){const key=safeKey(category,name);return mediaByKey()[key]||{}}
function recipeTitle(r){return currentLang==='ES'?(r.nameES||r.nameEN):(r.nameEN||r.nameES)}
function recipeText(r){return currentLang==='ES'?(r.textES||''):(r.textEN||'')}
function formatRecipeText(text){if(!text)return `<div class="empty">${esc(currentLang==='ES'?'No hay texto todavía.':'No recipe text has been entered yet.')}</div>`;return String(text).split('\n').map(raw=>{const line=raw.trimEnd();if(!line.trim())return '<div class="line">&nbsp;</div>';const clean=line.trim();const cls=/^[A-ZÁÉÍÓÚÜÑ0-9 &/()\-]+:$/.test(clean)||/^(ITEM NAME|NOMBRE DEL PRODUCTO|CATEGORY|CATEGORÍA|PORTION SIZE|TAMAÑO DE PORCIÓN|YIELD|RENDIMIENTO|PREP TIME|TIEMPO DE PREPARACIÓN|COOK TIME|TIEMPO DE COCCIÓN|HOLD TIME|TIEMPO DE MANTENIMIENTO|STORAGE|ALMACENAMIENTO):/.test(clean)?'sectionLine':(/^•/.test(clean)?'bulletLine':(/^\d+\./.test(clean)?'numberLine':'line'));return `<div class="${cls}">${esc(line)}</div>`}).join('')}
function loadBackend(){setSync('Loading','');google.script.run.withSuccessHandler(res=>{recipeRows=(res.recipes||[]).filter(r=>String(r.active||'TRUE')!=='FALSE');mediaRows=res.media||[];setSync('Synced','online');renderCategories();}).withFailureHandler(err=>{console.error(err);setSync('Backend Error','error');document.getElementById('view').innerHTML='<div class="empty">Backend failed. Check SHEET_ID in Code.gs and deploy the Apps Script web app.</div>';}).apiGetAll()}
function seedSheet(){if(!Object.keys(ORIGINAL_DATA).length){alert('Paste the full ORIGINAL_DATA object into index.html first, then seed.');return} setSync('Seeding',''); google.script.run.withSuccessHandler(()=>loadBackend()).withFailureHandler(e=>{console.error(e);setSync('Seed Error','error')}).apiSeedRecipes({data:ORIGINAL_DATA})}
function handleSearch(){const q=(document.getElementById('searchInput').value||'').trim().toLowerCase(); if(q)return renderSearch(q); if(currentItemName)renderRecipe(currentCategory,currentItemName); else if(currentCategory)renderItems(currentCategory); else renderCategories()}
function renderCategories(){currentCategory='';currentItemName='';setCrumbs(currentLang==='ES'?'Categorías':'Categories');const cats=[...new Set(recipeRows.map(r=>r.category).filter(Boolean))];document.getElementById('view').innerHTML=`<div class="toolbar"><div class="crumbs">${esc(currentLang==='ES'?'Elige una categoría':'Choose a category')} • ${recipeRows.length} ${currentLang==='ES'?'recetas':'recipes'}</div><button class="btn orange small" onclick="seedSheet()">Seed Sheet</button></div><div class="grid">${cats.map(c=>`<button class="card" onclick="renderItems(${jsArg(c)})"><div><div class="cardTitle">${esc(displayCategory(c))}</div><div class="cardMeta">${recipeRows.filter(r=>r.category===c).length} recipes</div></div><div>›</div></button>`).join('')||'<div class="empty">No recipes found in the sheet yet.</div>'}</div>`}
function renderItems(category){currentCategory=category;currentItemName='';setCrumbs(`${currentLang==='ES'?'Categorías':'Categories'} → ${displayCategory(category)}`);const items=recipeRows.filter(r=>r.category===category);document.getElementById('view').innerHTML=`<div class="back" onclick="renderCategories()">← Back to Categories</div><div class="grid">${items.map(r=>`<button class="card" onclick="renderRecipe(${jsArg(category)},${jsArg(r.nameEN)})"><div><div class="cardTitle">${esc(recipeTitle(r))}</div><div class="cardMeta">${esc(currentLang==='ES'?r.nameEN:(r.nameES||'Spanish name ready'))}</div></div><div>›</div></button>`).join('')}</div>`}
function renderSearch(q){setCrumbs(currentLang==='ES'?'Resultados de búsqueda':'Search results');const results=recipeRows.filter(r=>[r.category,r.nameEN,r.nameES,r.textEN,r.textES].join(' ').toLowerCase().includes(q));document.getElementById('view').innerHTML=`<div class="back" onclick="renderCategories()">← Back</div><div class="grid">${results.map(r=>`<button class="card" onclick="renderRecipe(${jsArg(r.category)},${jsArg(r.nameEN)})"><div><div class="cardTitle">${esc(recipeTitle(r))}</div><div class="cardMeta">${esc(displayCategory(r.category))}</div></div><div>›</div></button>`).join('')||'<div class="empty">No recipes found.</div>'}</div>`}
function renderRecipe(category,name){currentCategory=category;currentItemName=name;const r=getRecipe(category,name);if(!r){renderCategories();return}const m=getMedia(category,name);const title=recipeTitle(r);setCrumbs(`${displayCategory(category)} → ${title}`);document.getElementById('view').innerHTML=`<div class="back" onclick="renderItems(${jsArg(category)})">← Back to ${esc(displayCategory(category))}</div><article class="recipe"><div class="recipeInner"><div class="recipeTop"><section class="recipeDoc"><div class="docTop"><div class="docBrand"><div class="docLogo">HL</div><div><div class="docTitle">${esc(title)}</div><div class="docSub">Huey Luey's • Corporate Recipe Manual</div></div></div><div class="docId">Recipe<br>${esc(displayCategory(category))}<br>Training Card</div></div><div class="recipeMeta"><div class="metaBox"><div class="metaLabel">Category</div><div class="metaValue">${esc(displayCategory(category))}</div></div><div class="metaBox"><div class="metaLabel">English Name</div><div class="metaValue">${esc(r.nameEN)}</div></div><div class="metaBox"><div class="metaLabel">Spanish Name</div><div class="metaValue">${esc(r.nameES)}</div></div></div><div class="printPhotos"><div><div class="docSectionTitle">Recipe Photo</div><div class="printPhotoBox">${m.recipePhotoUrl?`<img src="${esc(m.recipePhotoUrl)}">`:'No photo'}</div></div><div><div class="docSectionTitle">Plate Presentation</div><div class="printPhotoBox">${m.platePhotoUrl?`<img src="${esc(m.platePhotoUrl)}">`:'No photo'}</div></div></div><div class="docSectionTitle">Recipe / Procedure</div><div class="recipeText">${formatRecipeText(recipeText(r))}</div><div class="platePrintNotes"><div class="docSectionTitle">Plate Presentation Notes</div><div class="recipeText">${formatRecipeText(m.plateNotes||'')}</div></div></section><aside class="sidePanel"><div><div class="docSectionTitle">Recipe Photo</div><div class="photoBox">${m.recipePhotoUrl?`<img src="${esc(m.recipePhotoUrl)}">`:'<div class="photoHint">Take / Upload Recipe Photo</div>'}</div><div class="photoActions"><label class="btn primary small" for="recipePhotoInput">Take / Upload</label><input class="fileInput" id="recipePhotoInput" type="file" accept="image/*" capture="environment" onchange="uploadImage(event,'recipe')"><button class="btn danger small" onclick="removeImage('recipe')">Remove</button></div></div><div><div class="docSectionTitle">Plate Presentation</div><div class="photoBox">${m.platePhotoUrl?`<img src="${esc(m.platePhotoUrl)}">`:'<div class="photoHint">Finished Plate Photo</div>'}</div><div class="photoActions"><label class="btn primary small" for="platePhotoInput">Take / Upload</label><input class="fileInput" id="platePhotoInput" type="file" accept="image/*" capture="environment" onchange="uploadImage(event,'plate')"><button class="btn danger small" onclick="removeImage('plate')">Remove</button></div></div><div><div class="docSectionTitle">Plate Presentation Notes</div><textarea id="plateNotesInput" class="plateNotesBox">${esc(m.plateNotes||'')}</textarea><div class="photoActions"><button class="btn primary small" onclick="savePlateNotes()">Save Notes</button></div></div><div class="statusNote">Photos save to Google Drive. Recipe text, photo links, and plate notes save to Google Sheets.</div><div class="recipeActions"><button class="btn primary" onclick="openEditor()">Edit Recipe</button><button class="btn orange" onclick="window.print()">Print / PDF</button><button class="btn" onclick="loadBackend()">Reload</button></div></aside></div></div></article>`}
function openEditor(){const r=getRecipe(currentCategory,currentItemName);document.getElementById('editTitle').textContent='Edit Recipe — '+(r.nameEN||currentItemName);document.getElementById('editNameEN').value=r.nameEN||'';document.getElementById('editNameES').value=r.nameES||'';document.getElementById('editEN').value=r.textEN||'';document.getElementById('editES').value=r.textES||'';document.getElementById('editModal').classList.add('open')} function closeEditor(){document.getElementById('editModal').classList.remove('open')}
function saveRecipeEdits(){const r=getRecipe(currentCategory,currentItemName);const payload={key:r.key||safeKey(currentCategory,currentItemName),category:currentCategory,nameEN:document.getElementById('editNameEN').value.trim(),nameES:document.getElementById('editNameES').value.trim(),textEN:document.getElementById('editEN').value,textES:document.getElementById('editES').value,active:'TRUE'};setSync('Saving','');google.script.run.withSuccessHandler(()=>{closeEditor();loadBackend()}).withFailureHandler(e=>{console.error(e);setSync('Save Error','error')}).apiSaveRecipe(payload)}
function savePlateNotes(){const r=getRecipe(currentCategory,currentItemName);const notes=document.getElementById('plateNotesInput').value;setSync('Saving Notes','');google.script.run.withSuccessHandler(()=>loadBackend()).withFailureHandler(e=>{console.error(e);setSync('Notes Error','error')}).apiSavePlateNotes({key:r.key,category:currentCategory,itemName:currentItemName,plateNotes:notes})}
function uploadImage(e,type){const file=e.target.files&&e.target.files[0];if(!file)return;setSync('Processing Photo','');resizeImageFile(file,1200,.76).then(dataUrl=>{const r=getRecipe(currentCategory,currentItemName);return new Promise((resolve,reject)=>google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).apiUploadImage({key:r.key,category:currentCategory,itemName:currentItemName,type,dataUrl}))}).then(()=>loadBackend()).catch(err=>{console.error(err);setSync('Photo Error','error');alert('Photo failed. Try a smaller image.')})}
function removeImage(type){const r=getRecipe(currentCategory,currentItemName);setSync('Removing','');google.script.run.withSuccessHandler(()=>loadBackend()).withFailureHandler(e=>{console.error(e);setSync('Remove Error','error')}).apiRemoveImage({key:r.key,category:currentCategory,itemName:currentItemName,type})}
function resizeImageFile(file,max=1200,quality=.76){return new Promise((resolve,reject)=>{const img=new Image();const url=URL.createObjectURL(file);img.onload=()=>{const scale=Math.min(1,max/Math.max(img.width,img.height));const canvas=document.createElement('canvas');canvas.width=Math.max(1,Math.round(img.width*scale));canvas.height=Math.max(1,Math.round(img.height*scale));canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);URL.revokeObjectURL(url);resolve(canvas.toDataURL('image/jpeg',quality))};img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('Invalid image'))};img.src=url})}
window.addEventListener('DOMContentLoaded',loadBackend);
</script>
